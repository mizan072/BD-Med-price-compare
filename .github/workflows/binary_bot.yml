name: Binary Options Engineon:schedule:- cron: '*/5 * * * *'workflow_dispatch:jobs:run-binary-bot:runs-on: ubuntu-lateststeps:- name: Checkout Repositoryuses: actions/checkout@v4  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: '20'
      
  - name: Install Dependencies
    run: npm install firebase-admin
    
  - name: Run Binary Engine
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
    run: node binary_bot.js

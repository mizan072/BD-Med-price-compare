<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>ScalpScanner - Binary Predictor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
    :root {
      --bg: #090d14;
      --surface: #111a24;
      --surface-hover: #15202b;
      --border: #1e2c3b;
      --text-main: #f0f4fa;
      --text-muted: #5f7d9a;
      --call: #33d9a8; /* Green for Call/Buy */
      --put: #f25b6a;  /* Red for Put/Sell */
      --wait: #f4c95d; /* Yellow for Wait */
    }
    body { background: var(--bg); min-height: 100vh; padding: 12px; display: flex; justify-content: center; color: var(--text-main); }
    .app { max-width: 950px; width: 100%; display: flex; flex-direction: column; gap: 20px; }
    
    .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .header h1 { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .header h1 span { background: linear-gradient(135deg, #a56eff, #681da8); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 30px; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
    
    .timer-card { background: linear-gradient(145deg, #111a24, #0a111a); border: 1px solid var(--border); border-radius: 16px; padding: 24px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.2); position: relative; overflow: hidden; }
    .timer-label { color: var(--text-muted); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .timer-value { font-size: 48px; font-weight: 800; font-family: monospace; letter-spacing: -2px; color: var(--text-main); text-shadow: 0 0 20px rgba(255,255,255,0.1); }
    .timer-value.danger { color: var(--wait); text-shadow: 0 0 20px rgba(244, 201, 93, 0.4); animation: pulse-text 1s infinite; }
    @keyframes pulse-text { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    
    .section-title { font-size: 14px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .predictions-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
    
    .pred-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 12px; transition: transform 0.2s, border-color 0.2s; }
    .pred-card.call { border-color: rgba(51, 217, 168, 0.4); background: linear-gradient(180deg, rgba(51,217,168,0.05) 0%, var(--surface) 100%); }
    .pred-card.put { border-color: rgba(242, 91, 106, 0.4); background: linear-gradient(180deg, rgba(242,91,106,0.05) 0%, var(--surface) 100%); }
    
    .pred-header { display: flex; justify-content: space-between; align-items: center; }
    .pred-sym { font-size: 18px; font-weight: 700; }
    .pred-prob { font-size: 12px; background: #1a2533; padding: 4px 8px; border-radius: 6px; color: var(--text-muted); font-family: monospace; }
    
    .pred-signal { font-size: 24px; font-weight: 800; text-align: center; padding: 12px 0; border-radius: 8px; background: #0c141d; border: 1px dashed var(--border); }
    .pred-signal.analyzing { color: var(--text-muted); font-size: 16px; font-weight: 500; font-style: italic; }
    .pred-signal.call { color: var(--call); text-shadow: 0 0 15px rgba(51,217,168,0.4); border-color: rgba(51,217,168,0.3); }
    .pred-signal.put { color: var(--put); text-shadow: 0 0 15px rgba(242,91,106,0.4); border-color: rgba(242,91,106,0.3); }
    
    .history-section { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
    .history-grid-header { display: grid; grid-template-columns: 100px 80px 100px 1fr; gap: 10px; padding: 12px 18px; background: #0c141d; border-bottom: 1px solid var(--border); color: var(--text-muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .history-list { max-height: 300px; overflow-y: auto; }
    .history-item { display: grid; grid-template-columns: 100px 80px 100px 1fr; gap: 10px; padding: 14px 18px; font-size: 13px; border-bottom: 1px solid #1a2533; align-items: center; }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { background: var(--surface-hover); }
    
    .h-time { color: var(--text-muted); font-size: 12px; }
    .h-sym { font-weight: 700; color: #fff; }
    .h-sig.call { color: var(--call); font-weight: 700; }
    .h-sig.put { color: var(--put); font-weight: 700; }
    
    .badge-result { padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; display: inline-flex; align-items: center; justify-content: center; max-width: 80px;}
    .badge-win { background: rgba(51, 217, 168, 0.1); color: var(--call); border: 1px solid rgba(51, 217, 168, 0.2); }
    .badge-loss { background: rgba(242, 91, 106, 0.1); color: var(--put); border: 1px solid rgba(242, 91, 106, 0.2); }

    .empty-state { text-align: center; padding: 30px; color: var(--text-muted); font-size: 14px; font-style: italic; }

    @media (max-width: 600px) {
      .history-grid-header { display: none; }
      .history-item { grid-template-columns: 1fr 1fr; gap: 8px; }
      .h-time { grid-column: 1 / 3; text-align: left; }
      .h-sym { font-size: 15px; }
      .h-sig { text-align: right; }
    }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>📡 ScalpScanner <span>Binary Next-Candle</span></h1>
    <span style="color: var(--text-muted); font-size: 13px;">🟢 Live Connection</span>
  </div>

  <div class="timer-card">
    <div class="timer-label">Current 5m Candle Closes In</div>
    <div class="timer-value" id="master-clock">00:00</div>
    <div style="margin-top: 10px; font-size: 12px; color: var(--text-muted);" id="clock-status">Gathering candlestick data...</div>
  </div>

  <div>
    <h3 class="section-title">⚡ Live Predictions (Next Candle)</h3>
    <div class="predictions-grid" id="predictions-container">
      <div class="empty-state" style="grid-column: 1/-1;">Connecting to predictive engine...</div>
    </div>
  </div>

  <div class="history-section">
    <h3 class="section-title" style="padding: 18px 18px 0 18px; margin: 0;">📜 Prediction Audit Log</h3>
    <div class="history-grid-header">
      <span>Time</span> <span>Asset</span> <span>Signal</span> <span>Result</span>
    </div>
    <div class="history-list" id="history-container">
      <div class="empty-state">No resolutions recorded yet.</div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // Reusing your exact existing Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyC1zcOaqRf9_zHylKg_ERfAzl6rnYOKAi0",
    authDomain: "scalpscanner-74a22.firebaseapp.com",
    projectId: "scalpscanner-74a22",
    storageBucket: "scalpscanner-74a22.firebasestorage.app",
    messagingSenderId: "265105859600",
    appId: "1:265105859600:web:3c00612e48453274c25695"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // --- 1. MASTER CLOCK LOGIC ---
  function updateClock() {
    const now = new Date();
    const ms = now.getTime();
    const fiveMin = 5 * 60 * 1000;
    
    // Calculate time remaining until the next 5-minute interval
    const remainder = ms % fiveMin;
    const timeLeftMs = fiveMin - remainder;
    
    const mins = Math.floor(timeLeftMs / 60000);
    const secs = Math.floor((timeLeftMs % 60000) / 1000);
    
    const clockEl = document.getElementById('master-clock');
    const statusEl = document.getElementById('clock-status');
    
    clockEl.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    
    // Visual Cues based on time left
    if (timeLeftMs <= 30000) {
      // Last 30 seconds
      clockEl.classList.add('danger');
      statusEl.innerText = "⚠️ Finalizing predictions for next candle...";
      statusEl.style.color = "var(--wait)";
    } else if (timeLeftMs >= (fiveMin - 10000)) {
      // First 10 seconds of a new candle
      clockEl.classList.remove('danger');
      statusEl.innerText = "Candle closed. Awaiting results...";
      statusEl.style.color = "var(--text-muted)";
    } else {
      // Normal analyzing phase
      clockEl.classList.remove('danger');
      statusEl.innerText = "Analyzing live price action and momentum...";
      statusEl.style.color = "var(--text-muted)";
    }
  }
  
  setInterval(updateClock, 1000);
  updateClock(); // Run immediately

  // --- 2. FIREBASE SYNC LOGIC ---
  // We will listen to a new collection called "binary_signals"
  const q = query(collection(db, "binary_signals"), orderBy("timestamp", "desc"), limit(30));
  
  const predContainer = document.getElementById('predictions-container');
  const histContainer = document.getElementById('history-container');

  onSnapshot(q, (snapshot) => {
    const active = [];
    const history = [];

    snapshot.forEach((doc) => {
      const data = doc.data();
      // 'PENDING' means the signal is for the upcoming candle
      if (data.status === 'PENDING') active.push(data);
      else history.push(data); // 'WIN' or 'LOSS'
    });

    renderPredictions(active);
    renderHistory(history);
  }, (error) => {
    console.error("Firebase Error: ", error);
    predContainer.innerHTML = `<div class="empty-state" style="color: var(--put);">Database connection error.</div>`;
  });

  function renderPredictions(preds) {
    if (preds.length === 0) {
      predContainer.innerHTML = `<div class="empty-state" style="grid-column: 1/-1;">Market conditions unclear. Awaiting next setup...</div>`;
      return;
    }

    let html = '';
    preds.forEach(p => {
      const isCall = p.signal === 'CALL';
      const sigClass = isCall ? 'call' : 'put';
      const sigText = isCall ? '▲ CALL (BUY)' : '▼ PUT (SELL)';
      
      html += `
        <div class="pred-card ${sigClass}">
          <div class="pred-header">
            <span class="pred-sym">${p.symbol.replace('USDT', '')}</span>
            <span class="pred-prob">${p.probability}% Conf.</span>
          </div>
          <div class="pred-signal ${sigClass}">${sigText}</div>
        </div>
      `;
    });
    predContainer.innerHTML = html;
  }

  function renderHistory(history) {
    if (history.length === 0) {
      histContainer.innerHTML = `<div class="empty-state">No resolutions recorded yet.</div>`;
      return;
    }

    let html = '';
    history.forEach(h => {
      const isCall = h.signal === 'CALL';
      const sigClass = isCall ? 'call' : 'put';
      
      let resBadge = '';
      if (h.status === 'WIN') resBadge = `<span class="badge-result badge-win">✅ WIN</span>`;
      else if (h.status === 'LOSS') resBadge = `<span class="badge-result badge-loss">❌ LOSS</span>`;
      else resBadge = `<span class="badge-result" style="background:#1a2533;color:#fff;">DRAW</span>`;

      // Format time
      let timeStr = '—';
      if (h.timestamp) {
        const d = new Date(h.timestamp);
        timeStr = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
      }

      html += `
        <div class="history-item">
          <span class="h-time">${timeStr}</span>
          <span class="h-sym">${h.symbol.replace('USDT', '')}</span>
          <span class="h-sig ${sigClass}">${h.signal}</span>
          <span>${resBadge}</span>
        </div>
      `;
    });
    histContainer.innerHTML = html;
  }
</script>
</body>
</html>

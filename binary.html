<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScalpScanner | USD/JPY Binary</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg-dark: #0b0e14;
            --panel-bg: #151a23;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-yellow: #f59e0b;
            --accent-blue: #3b82f6;
            --border-color: #1e293b;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* HEADER & CLOCK */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .title-group h1 { margin: 0; font-size: 24px; display: flex; align-items: center; gap: 10px; }
        .tag { background: var(--accent-yellow); color: #000; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-badge { background: rgba(16, 185, 129, 0.1); color: var(--accent-green); padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px;}

        .clock-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            margin-bottom: 24px;
        }
        .clock-panel h2 { margin: 0 0 10px 0; color: var(--text-muted); font-size: 14px; letter-spacing: 1px; }
        .timer-display { font-size: 64px; font-weight: bold; font-family: 'Courier New', Courier, monospace; letter-spacing: 4px; margin: 0; }
        .pulse-yellow { color: var(--accent-yellow); text-shadow: 0 0 20px rgba(245, 158, 11, 0.4); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* CHART CONTAINER */
        .chart-container {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .chart-header h3 { margin: 0; font-size: 16px; color: var(--text-muted); }

        /* HISTORY GRID */
        .grid-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
        }
        .grid-panel h3 { margin: 0 0 15px 0; font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;}
        
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 12px; color: var(--text-muted); font-weight: normal; font-size: 12px; border-bottom: 1px solid var(--border-color); }
        td { padding: 15px 12px; border-bottom: 1px solid rgba(30, 41, 59, 0.5); font-size: 14px; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .signal-call { color: var(--accent-green); font-weight: bold; }
        .signal-put { color: var(--accent-red); font-weight: bold; }
        .signal-none { color: var(--text-muted); font-style: italic; }

        .result-win { background: rgba(16, 185, 129, 0.1); color: var(--accent-green); padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold;}
        .result-loss { background: rgba(239, 68, 68, 0.1); color: var(--accent-red); padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold;}
        .result-pending { background: rgba(59, 130, 246, 0.1); color: var(--accent-blue); padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; animation: pulse 2s infinite;}
        .result-none { background: rgba(100, 116, 139, 0.1); color: var(--text-muted); padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold;}
        
        .conf-bar { height: 4px; background: var(--border-color); border-radius: 2px; margin-top: 4px; width: 60px; overflow: hidden; }
        .conf-fill { height: 100%; }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="title-group">
            <h1>📡 ScalpScanner <span class="tag">BINARY</span></h1>
        </div>
        <div class="status-badge">🟢 Live · Connected to Database</div>
    </div>

    <!-- 1. MASTER CLOCK -->
    <div class="clock-panel">
        <h2>TIME UNTIL NEXT 5M CANDLE EVALUATION</h2>
        <div id="masterClock" class="timer-display">00:00</div>
    </div>

    <!-- 2. LIVE CHART (OFFICIAL TRADINGVIEW WIDGET) -->
    <div class="chart-container">
        <div class="chart-header">
            <h3>📈 LIVE MARKET (USD/JPY)</h3>
        </div>
        <!-- TradingView Widget BEGIN -->
        <div class="tradingview-widget-container" style="height: 450px; width: 100%;">
          <div id="tradingview_usdjpy" style="height: 450px; width: 100%;"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
          <script type="text/javascript">
          new TradingView.widget({
            "autosize": true,
            "symbol": "FX:USDJPY",
            "interval": "5",
            "timezone": "Asia/Dhaka",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "enable_publishing": false,
            "backgroundColor": "#151a23",
            "gridColor": "#1e293b",
            "hide_top_toolbar": true,
            "hide_legend": true,
            "save_image": false,
            "container_id": "tradingview_usdjpy"
          });
          </script>
        </div>
        <!-- TradingView Widget END -->
    </div>

    <!-- 3. RESOLUTION HISTORY -->
    <div class="grid-panel">
        <h3>📜 USD/JPY Candle Analysis History</h3>
        <table>
            <thead>
                <tr>
                    <th>Local Time (BST)</th>
                    <th>Prediction</th>
                    <th>Confidence</th>
                    <th>Entry Price</th>
                    <th>Result</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                <tr><td colspan="5" style="text-align: center; color: var(--text-muted);">Fetching analysis history...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // --- FIREBASE SETUP ---
    const firebaseConfig = {
        apiKey: "AIzaSyC1zcOaqRf9_zHylKg_ERfAzl6rnYOKAi0",
        authDomain: "scalpscanner-74a22.firebaseapp.com",
        projectId: "scalpscanner-74a22",
        storageBucket: "scalpscanner-74a22.firebasestorage.app",
        messagingSenderId: "265105859600",
        appId: "1:265105859600:web:3c00612e48453274c25695"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- CLOCK LOGIC ---
    function updateClock() {
        const now = new Date();
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();
        const remainderMin = 4 - (minutes % 5);
        const remainderSec = 59 - seconds;

        const clockEl = document.getElementById('masterClock');
        clockEl.innerText = `0${remainderMin}:${remainderSec < 10 ? '0' : ''}${remainderSec}`;
        
        if (remainderMin === 0 && remainderSec <= 30) {
            clockEl.className = 'timer-display pulse-yellow';
        } else {
            clockEl.className = 'timer-display';
        }
    }
    setInterval(updateClock, 1000);
    updateClock();

    // --- FIREBASE LISTENER FOR HISTORY ---
    // FIX: Removed `.where('symbol', '==', 'USD/JPY')` to bypass the Firebase Index requirement.
    db.collection('binary_signals')
      .orderBy('timestamp', 'desc')
      .limit(20)
      .onSnapshot(snapshot => {
        const historyBody = document.getElementById('historyBody');
        historyBody.innerHTML = '';

        if (snapshot.empty) {
            historyBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#64748b;">No market analysis generated yet. Waiting for bot cycle...</td></tr>`;
            return;
        }

        snapshot.forEach(doc => {
            const data = doc.data();
            
            // Safety check in Javascript instead of a strict database rule
            if(data.symbol !== 'USD/JPY') return;

            const date = new Date(data.timestamp);
            const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            // Format Signal Text
            let sigHtml = `<span class="signal-none">NO TRADE</span>`;
            if (data.signal === 'CALL') sigHtml = `<span class="signal-call">CALL ⬆</span>`;
            if (data.signal === 'PUT') sigHtml = `<span class="signal-put">PUT ⬇</span>`;

            // Format Confidence Bar
            let confHtml = `<span style="color:#64748b; font-size: 12px;">--</span>`;
            if (data.signal !== 'NO TRADE') {
                const confColor = data.probability >= 80 ? 'var(--accent-green)' : 'var(--accent-yellow)';
                confHtml = `
                    <div style="font-weight:bold; font-size:14px;">${data.probability}%</div>
                    <div class="conf-bar"><div class="conf-fill" style="width: ${data.probability}%; background: ${confColor};"></div></div>
                `;
            }

            // Format Result Badge
            let resHtml = `<span class="result-none">FLAT</span>`;
            if (data.status === 'WIN') resHtml = `<span class="result-win">WIN</span>`;
            else if (data.status === 'LOSS') resHtml = `<span class="result-loss">LOSS</span>`;
            else if (data.status === 'PENDING') resHtml = `<span class="result-pending">LIVE NOW</span>`;
            else if (data.status === 'NO TRADE') resHtml = `<span class="result-none">--</span>`;

            historyBody.innerHTML += `
                <tr>
                    <td><strong style="color:var(--text-main);">${timeStr}</strong></td>
                    <td>${sigHtml}</td>
                    <td>${confHtml}</td>
                    <td style="color:#64748b;">${data.signal === 'NO TRADE' || !data.entryPrice ? '--' : data.entryPrice.toFixed(4)}</td>
                    <td>${resHtml}</td>
                </tr>
            `;
        });
    });
</script>
</body>
</html>

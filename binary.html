<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScalpScanner | USD/JPY Binary</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg-dark: #0b0e14;
            --panel-bg: #151a23;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-yellow: #f59e0b;
            --accent-blue: #3b82f6;
            --border-color: #1e293b;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* HEADER & BADGES */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .title-group h1 { margin: 0; font-size: 24px; display: flex; align-items: center; gap: 10px; }
        .tag { background: var(--accent-yellow); color: #000; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-badge { background: rgba(16, 185, 129, 0.1); color: var(--accent-green); padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px;}

        /* TOP DASHBOARD (TIMER & SIGNAL) */
        .top-dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }
        .clock-panel, .signal-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        
        .clock-panel h2, .signal-panel h2 { margin: 0 0 15px 0; color: var(--text-muted); font-size: 14px; letter-spacing: 1px; }
        
        /* Timer Styles */
        .timer-display { font-size: 64px; font-weight: bold; font-family: 'Courier New', Courier, monospace; letter-spacing: 4px; margin: 0; }
        .pulse-yellow { color: var(--accent-yellow); text-shadow: 0 0 20px rgba(245, 158, 11, 0.4); animation: pulse 1s infinite; }
        
        /* Signal Styles */
        .live-signal-box { font-size: 54px; font-weight: bold; margin-bottom: 10px; }
        .live-signal-call { color: var(--accent-green); text-shadow: 0 0 25px rgba(16, 185, 129, 0.4); animation: pulse-green 1.5s infinite; }
        .live-signal-put { color: var(--accent-red); text-shadow: 0 0 25px rgba(239, 68, 68, 0.4); animation: pulse-red 1.5s infinite; }
        .live-signal-none { color: var(--text-muted); font-size: 36px; }
        .live-conf { font-size: 16px; margin-top: 5px; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes pulse-green { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* CHART CONTAINER */
        .chart-container {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .chart-header h3 { margin: 0; font-size: 16px; color: var(--text-muted); }

        /* HISTORY GRID */
        .grid-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
        }
        .grid-panel h3 { margin: 0 0 15px 0; font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;}
        
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 12px; color: var(--text-muted); font-weight: normal; font-size: 12px; border-bottom: 1px solid var(--border-color); }
        td { padding: 15px 12px; border-bottom: 1px solid rgba(30, 41, 59, 0.5); font-size: 14px; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        .signal-call { color: var(--accent-green); font-weight: bold; }
        .signal-put { color: var(--accent-red); font-weight: bold; }
        .signal-none { color: var(--text-muted); font-style: italic; }

        .result-win { background: rgba(16, 185, 129, 0.1); color: var(--accent-green); padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold;}
        .result-loss { background: rgba(239, 68, 68, 0.1); color: var(--accent-red); padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold;}
        .result-none { background: rgba(100, 116, 139, 0.1); color: var(--text-muted); padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold;}
        
        @media (max-width: 768px) {
            .top-dashboard { grid-template-columns: 1fr; gap: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="title-group">
            <h1>📡 ScalpScanner <span class="tag">BINARY</span></h1>
        </div>
        <div class="status-badge">🟢 Live · Connected to Database</div>
    </div>

    <!-- NEW: TOP DASHBOARD (SPLIT TIMER & SIGNAL) -->
    <div class="top-dashboard">
        <!-- 1. MASTER CLOCK -->
        <div class="clock-panel">
            <h2>TIME UNTIL NEXT 5M CANDLE</h2>
            <div id="masterClock" class="timer-display">00:00</div>
        </div>
        
        <!-- 2. LIVE SIGNAL PANEL -->
        <div class="signal-panel">
            <h2>CURRENT CANDLE SIGNAL</h2>
            <div id="liveSignalBox" class="live-signal-box">
                <span style="color: var(--text-muted); font-size: 20px;">Fetching market data...</span>
            </div>
            <div id="liveSignalConf" class="live-conf"></div>
        </div>
    </div>

    <!-- 3. LIVE CHART -->
    <div class="chart-container">
        <div class="chart-header">
            <h3>📈 LIVE MARKET (USD/JPY)</h3>
        </div>
        <!-- TradingView Widget BEGIN -->
        <div class="tradingview-widget-container" style="height: 450px; width: 100%;">
          <div id="tradingview_usdjpy" style="height: 450px; width: 100%;"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
          <script type="text/javascript">
          new TradingView.widget({
            "autosize": true,
            "symbol": "FX:USDJPY",
            "interval": "5",
            "timezone": "Asia/Dhaka",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "enable_publishing": false,
            "backgroundColor": "#151a23",
            "gridColor": "#1e293b",
            "hide_top_toolbar": true,
            "hide_legend": true,
            "save_image": false,
            "container_id": "tradingview_usdjpy"
          });
          </script>
        </div>
        <!-- TradingView Widget END -->
    </div>

    <!-- 4. RESOLUTION HISTORY (RESULTS ONLY) -->
    <div class="grid-panel">
        <h3>📜 USD/JPY Candle Analysis History (Results Only)</h3>
        <table>
            <thead>
                <tr>
                    <th>Local Time (BST)</th>
                    <th>Prediction</th>
                    <th>Entry Price</th>
                    <th>Result</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                <tr><td colspan="4" style="text-align: center; color: var(--text-muted);">Fetching analysis history...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // --- FIREBASE SETUP ---
    const firebaseConfig = {
        apiKey: "AIzaSyC1zcOaqRf9_zHylKg_ERfAzl6rnYOKAi0",
        authDomain: "scalpscanner-74a22.firebaseapp.com",
        projectId: "scalpscanner-74a22",
        storageBucket: "scalpscanner-74a22.firebasestorage.app",
        messagingSenderId: "265105859600",
        appId: "1:265105859600:web:3c00612e48453274c25695"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- CLOCK LOGIC ---
    function updateClock() {
        const now = new Date();
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();
        const remainderMin = 4 - (minutes % 5);
        const remainderSec = 59 - seconds;

        const clockEl = document.getElementById('masterClock');
        clockEl.innerText = `0${remainderMin}:${remainderSec < 10 ? '0' : ''}${remainderSec}`;
        
        if (remainderMin === 0 && remainderSec <= 30) {
            clockEl.className = 'timer-display pulse-yellow';
        } else {
            clockEl.className = 'timer-display';
        }
    }
    setInterval(updateClock, 1000);
    updateClock();

    // --- FIREBASE LISTENER FOR LIVE SIGNAL & HISTORY ---
    db.collection('binary_signals')
      .orderBy('timestamp', 'desc')
      .limit(20)
      .onSnapshot(snapshot => {
        const historyBody = document.getElementById('historyBody');
        const liveBox = document.getElementById('liveSignalBox');
        const liveConf = document.getElementById('liveSignalConf');
        
        historyBody.innerHTML = '';

        const docs = [];
        snapshot.forEach(doc => {
            if(doc.data().symbol === 'USD/JPY') docs.push(doc.data());
        });

        if (docs.length === 0) {
            liveBox.innerHTML = `<span style="color: var(--text-muted); font-size: 20px;">Waiting for first bot cycle...</span>`;
            historyBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#64748b;">No market analysis generated yet.</td></tr>`;
            return;
        }

        // --- 1. RENDER THE CURRENT LIVE SIGNAL ---
        const currentData = docs[0];
        
        if (currentData.signal === 'CALL') {
            liveBox.innerHTML = `<div class="live-signal-call">CALL ⬆</div>`;
            liveConf.innerHTML = `<span style="color: var(--accent-green); font-weight: bold;">Confidence: ${currentData.probability}%</span>`;
        } else if (currentData.signal === 'PUT') {
            liveBox.innerHTML = `<div class="live-signal-put">PUT ⬇</div>`;
            liveConf.innerHTML = `<span style="color: var(--accent-red); font-weight: bold;">Confidence: ${currentData.probability}%</span>`;
        } else {
            liveBox.innerHTML = `<div class="live-signal-none">NO TRADE</div>`;
            liveConf.innerHTML = `<span style="color: var(--text-muted);">Market condition: ${currentData.reason || 'Flat'}</span>`;
        }

        // --- 2. RENDER THE HISTORY TABLE (RESULTS ONLY) ---
        // We skip the first document (index 0) because that is our live active signal
        const historyData = docs.slice(1);

        if (historyData.length === 0) {
            historyBody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#64748b;">No past results to display yet.</td></tr>`;
            return;
        }

        historyData.forEach(data => {
            const date = new Date(data.timestamp);
            const timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            // Format Signal Text
            let sigHtml = `<span class="signal-none">NO TRADE</span>`;
            if (data.signal === 'CALL') sigHtml = `<span class="signal-call">CALL ⬆</span>`;
            if (data.signal === 'PUT') sigHtml = `<span class="signal-put">PUT ⬇</span>`;

            // Format Result Badge (Only show resolved states, skip pending)
            let resHtml = `<span class="result-none">FLAT / NO TRADE</span>`;
            if (data.status === 'WIN') resHtml = `<span class="result-win">WIN</span>`;
            else if (data.status === 'LOSS') resHtml = `<span class="result-loss">LOSS</span>`;
            else if (data.status === 'PENDING') return; // Skip currently pending trades from history table

            historyBody.innerHTML += `
                <tr>
                    <td><strong style="color:var(--text-main);">${timeStr}</strong></td>
                    <td>${sigHtml}</td>
                    <td style="color:#64748b; font-family: monospace;">${data.signal === 'NO TRADE' || !data.entryPrice ? '--' : data.entryPrice.toFixed(4)}</td>
                    <td>${resHtml}</td>
                </tr>
            `;
        });
    });
</script>
</body>
</html>

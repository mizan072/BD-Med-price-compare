<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <title>ScalpScanner Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
    body { background: #090d14; min-height: 100vh; padding: 12px; display: flex; justify-content: center; }
    .app { max-width: 900px; width: 100%; }

    /* Header */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
    .header h1 { color: #f0f4fa; font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 10px; white-space: nowrap; }
    .header h1 span { background: linear-gradient(135deg, #33d9a8, #1db883); font-size: 12px; font-weight: 600; padding: 2px 12px; border-radius: 30px; color: #090d14; }
    .badge { background: #161f2b; padding: 5px 14px; border-radius: 40px; color: #9ab0c9; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 8px; border: 1px solid #253240; white-space: nowrap; }
    .badge .dot { width: 7px; height: 7px; background: #33d9a8; border-radius: 50%; display: inline-block; animation: pulse-dot 1.6s infinite; }
    @keyframes pulse-dot { 0% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.3; transform: scale(0.9); } }

    /* Top bar */
    .top-bar { display: flex; justify-content: space-between; align-items: center; background: #111a24; padding: 8px 16px; border-radius: 14px; border: 1px solid #1e2c3b; margin-bottom: 16px; flex-wrap: wrap; gap: 6px; }
    .top-bar .status { color: #7a94af; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .top-bar .status .live { color: #33d9a8; font-weight: 600; }
    .top-bar .status .error { color: #f25b6a; font-weight: 600; }
    .refresh-btn { background: #1e2c3b; border: none; color: #d6e4f0; padding: 6px 18px; border-radius: 30px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; border: 1px solid #2d3f52; transition: 0.2s; min-height: 40px; min-width: 40px; justify-content: center; }
    .refresh-btn:hover:not(:disabled) { background: #2d3f52; }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .refresh-btn .spinner { width: 14px; height: 14px; border: 2px solid #5f7d9a; border-top-color: #d6e4f0; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Signals container */
    .signals-container { background: #111a24; border-radius: 16px; border: 1px solid #1e2c3b; overflow: hidden; margin-bottom: 24px; }
    .signals-header { display: grid; grid-template-columns: 50px 40px 80px 1fr 80px 80px 100px 70px; gap: 4px; padding: 8px 12px; background: #0a111a; border-bottom: 1px solid #1e2c3b; color: #5f7d9a; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .signals-grid { display: flex; flex-direction: column; max-height: 420px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .signals-grid::-webkit-scrollbar { width: 4px; }
    .signals-grid::-webkit-scrollbar-track { background: #0a111a; }
    .signals-grid::-webkit-scrollbar-thumb { background: #2d3f52; border-radius: 4px; }

    .signal-row {
      display: grid; grid-template-columns: 50px 40px 80px 1fr 80px 80px 100px 70px; gap: 4px;
      padding: 8px 12px; align-items: center; border-bottom: 1px solid #1a2533;
      font-size: 13px; transition: background 0.15s; background: #111a24; min-height: 48px;
    }
    .signal-row:last-child { border-bottom: none; }
    .signal-row:hover { background: #1a2633; }
    .signal-row .col-sym { font-weight: 700; color: #f0f4fa; font-size: 14px; }
    .signal-row .col-dir { font-weight: 700; font-size: 13px; text-align: center; }
    .signal-row .col-dir.long { color: #33d9a8; }
    .signal-row .col-dir.short { color: #f25b6a; }
    .signal-row .col-price { color: #d6e4f0; font-weight: 500; white-space: nowrap; }
    .signal-row .col-entry { color: #9ab0c9; font-size: 12px; white-space: nowrap; }
    .signal-row .col-tp { color: #33d9a8; font-weight: 500; font-size: 12px; }
    .signal-row .col-sl { color: #f25b6a; font-weight: 500; font-size: 12px; }
    .signal-row .col-conf { font-weight: 700; font-size: 13px; text-align: center; display: flex; align-items: center; gap: 4px; justify-content: center; flex-wrap: wrap; }
    .conf-bar-container { width: 40px; height: 4px; background: #1e2c3b; border-radius: 2px; overflow: hidden; flex-shrink: 0; }
    .conf-bar { height: 100%; border-radius: 2px; }
    .conf-bar.high { background: #33d9a8; }
    .conf-bar.medium { background: #f4c95d; }
    .conf-bar.low { background: #f25b6a; }
    .signal-row .col-time { color: #5f7d9a; font-size: 11px; text-align: right; white-space: nowrap; }
    .signal-row.long { border-left: 3px solid #33d9a8; }
    .signal-row.short { border-left: 3px solid #f25b6a; }
    .empty-state { color: #5f7d9a; text-align: center; padding: 28px 10px; font-size: 13px; }

    /* History section */
    .history-section { background: #111a24; border-radius: 16px; padding: 12px 0 0 0; border: 1px solid #1e2c3b; overflow: hidden; }
    .history-header { display: flex; justify-content: space-between; align-items: center; padding: 0 14px 10px 14px; flex-wrap: wrap; gap: 6px; }
    .history-header h3 { color: #9ab0c9; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .history-header .count { background: #1a2430; padding: 1px 12px; border-radius: 30px; font-size: 11px; color: #7a94af; white-space: nowrap; }
    .history-list { display: flex; flex-direction: column; max-height: 340px; overflow-y: auto; padding: 0 4px 4px 4px; -webkit-overflow-scrolling: touch; }
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-track { background: #0a111a; border-radius: 4px; }
    .history-list::-webkit-scrollbar-thumb { background: #2d3f52; border-radius: 4px; }

    .history-item {
      display: grid; grid-template-columns: 45px 30px 55px 60px 75px 55px;
      gap: 4px 6px; padding: 7px 10px; font-size: 12px; align-items: center;
      border-bottom: 1px solid #1a2533; background: #111a24; min-height: 44px;
    }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { background: #1a2633; }
    .history-item .h-sym { font-weight: 700; color: #f0f4fa; font-size: 13px; }
    .history-item .h-dir { font-weight: 600; font-size: 11px; text-align: center; }
    .history-item .h-dir.long { color: #33d9a8; }
    .history-item .h-dir.short { color: #f25b6a; }
    .history-item .h-time { color: #5f7d9a; font-size: 10px; white-space: nowrap; }
    .history-item .h-duration { font-size: 10px; font-weight: 600; text-align: center; background: #1a2430; padding: 1px 6px; border-radius: 20px; white-space: nowrap; }
    .history-item .h-duration.fast { color: #33d9a8; }
    .history-item .h-duration.medium { color: #f4c95d; }
    .history-item .h-duration.slow { color: #f25b6a; }
    .history-item .h-result { font-weight: 700; font-size: 12px; text-align: center; }
    .history-item .h-result.win { color: #33d9a8; }
    .history-item .h-result.loss { color: #f25b6a; }
    .history-item .h-price { font-size: 10px; color: #7a94af; text-align: right; white-space: nowrap; }

    /* ========== RESPONSIVE BREAKPOINTS ========== */

    /* Tablets and larger phones (<=768px) */
    @media (max-width: 768px) {
      .signals-header { font-size: 9px; grid-template-columns: 45px 35px 70px 1fr 70px 70px 80px 60px; }
      .signal-row { grid-template-columns: 45px 35px 70px 1fr 70px 70px 80px 60px; font-size: 12px; }
      .signal-row .col-sym { font-size: 13px; }
      .signal-row .col-entry { font-size: 11px; }
      .signal-row .col-tp, .signal-row .col-sl { font-size: 11px; }
      .signal-row .col-conf { font-size: 12px; }
      .conf-bar-container { width: 30px; }
    }

    /* Smaller tablets / large phones (<=650px) - switch to two-row signal card */
    @media (max-width: 650px) {
      .signals-header { display: none; }
      .signal-row {
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: auto auto auto auto;
        gap: 2px 8px; padding: 10px 12px; border-left: 3px solid transparent;
      }
      .signal-row.long { border-left-color: #33d9a8; }
      .signal-row.short { border-left-color: #f25b6a; }

      .signal-row .col-sym { grid-column: 1 / 2; grid-row: 1 / 2; font-size: 16px; }
      .signal-row .col-dir { grid-column: 2 / 3; grid-row: 1 / 2; text-align: left; }
      .signal-row .col-price { grid-column: 3 / 4; grid-row: 1 / 2; text-align: right; font-size: 14px; }

      .signal-row .col-entry { grid-column: 1 / 3; grid-row: 2 / 3; font-size: 11px; color: #7a94af; }
      .signal-row .col-tp { grid-column: 1 / 2; grid-row: 3 / 4; font-size: 11px; }
      .signal-row .col-sl { grid-column: 2 / 3; grid-row: 3 / 4; font-size: 11px; }
      .signal-row .col-conf { grid-column: 3 / 4; grid-row: 3 / 4; font-size: 14px; text-align: right; justify-content: flex-end; }
      .signal-row .col-time { display: none; }

      .history-item {
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: auto auto;
        gap: 2px 6px; padding: 8px 10px;
      }
      .history-item .h-sym { grid-column: 1 / 2; grid-row: 1 / 2; font-size: 14px; }
      .history-item .h-dir { grid-column: 2 / 3; grid-row: 1 / 2; text-align: left; }
      .history-item .h-time { grid-column: 3 / 4; grid-row: 1 / 2; text-align: right; }
      .history-item .h-duration { grid-column: 1 / 2; grid-row: 2 / 3; text-align: left; background: none; padding: 0; }
      .history-item .h-result { grid-column: 2 / 3; grid-row: 2 / 3; text-align: left; }
      .history-item .h-price { grid-column: 3 / 4; grid-row: 2 / 3; text-align: right; }
      .history-item .h-duration.fast, .history-item .h-duration.medium, .history-item .h-duration.slow { background: none; padding: 0; }
    }

    /* Small phones (<=480px) */
    @media (max-width: 480px) {
      body { padding: 8px; }
      .header h1 { font-size: 20px; gap: 6px; }
      .header h1 span { font-size: 10px; padding: 2px 10px; }
      .badge { font-size: 11px; padding: 4px 10px; }
      .top-bar { padding: 8px 12px; border-radius: 12px; }
      .top-bar .status { font-size: 11px; }
      .refresh-btn { padding: 5px 14px; font-size: 12px; min-height: 38px; }
      .signal-row { padding: 8px 10px; }
      .signal-row .col-sym { font-size: 15px; }
      .signal-row .col-price { font-size: 13px; }
      .signal-row .col-conf { font-size: 13px; }
      .conf-bar-container { width: 32px; }
      .history-item { font-size: 11px; }
    }

    /* Very small phones (<=380px) */
    @media (max-width: 380px) {
      .header h1 { font-size: 18px; }
      .header h1 span { display: none; }  /* hide "PRO" badge on very tiny screens */
      .badge { font-size: 10px; padding: 3px 8px; }
      .signal-row .col-sym { font-size: 14px; }
      .signal-row .col-price { font-size: 12px; }
      .signal-row .col-conf { font-size: 12px; justify-content: flex-end; }
      .conf-bar-container { width: 28px; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📡 ScalpScanner <span>PRO</span></h1>
    <span class="badge"><span class="dot"></span> <span id="liveCount">0</span> active</span>
  </div>

  <div class="top-bar">
    <span class="status" id="statusText">🟢 <span class="live">Live</span> · scanning...</span>
    <button class="refresh-btn" id="refreshBtn">⟳ Refresh</button>
  </div>

  <div class="signals-container">
    <div class="signals-header">
      <span>Coin</span> <span>Dir</span> <span>Price</span> <span>Entry Range</span>
      <span>TP</span> <span>SL</span> <span>Confidence</span> <span>Time</span>
    </div>
    <div class="signals-grid" id="signalsGrid">
      <div class="empty-state">No active signals. Waiting for setup...</div>
    </div>
  </div>

  <div class="history-section">
    <div class="history-header">
      <h3>📜 Trade History (Closed)</h3>
      <span class="count" id="historyCount">0 entries</span>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-state">No completed trades yet.</div>
    </div>
  </div>
</div>

<script>
  // ================================================================

  // ================================================================
  const GOOGLE_SCRIPT_URL =
    'https://script.google.com/macros/s/AKfycbw_Dm7ShMbtispqIZAGen1g9ZKHbaMYGLuJuipsliNv6bD_4vx0fsEOo2V2CdE5HzdH/exec';

  const TICK_SIZE = {
    'BTCUSDT': 0.01, 'ETHUSDT': 0.01, 'BNBUSDT': 0.01,
    'SOLUSDT': 0.001, 'AVAXUSDT': 0.001, 'DOTUSDT': 0.001, 'LINKUSDT': 0.001,
    'XRPUSDT': 0.0001, 'ADAUSDT': 0.0001, 'DOGEUSDT': 0.00001
  };
  const COINS = ['BTCUSDT','ETHUSDT','BNBUSDT','SOLUSDT','XRPUSDT','ADAUSDT','DOGEUSDT','AVAXUSDT','DOTUSDT','LINKUSDT'];
  const SCAN_INTERVAL = 15000;
  const HISTORY_INTERVAL = 30000;
  const SIGNAL_EXPIRY_MINUTES = 30;

  const $ = id => document.getElementById(id);
  const signalsGrid = $('signalsGrid');
  const historyList = $('historyList');
  const statusText = $('statusText');
  const refreshBtn = $('refreshBtn');
  const liveCount = $('liveCount');
  const historyCount = $('historyCount');

  function getTick(symbol) { return TICK_SIZE[symbol] || 0.01; }
  function roundToTick(value, tick) { const factor = 1 / tick; return Math.round(value * factor) / factor; }
  function formatPrice(value, tick) { if (!tick) return '$' + value.toFixed(2); const decimals = Math.max(0, Math.ceil(-Math.log10(tick))); return '$' + value.toFixed(decimals); }
  function fmtTime(iso) { if (!iso) return '—'; try { const d = new Date(iso); return d.toLocaleTimeString('en-US', { hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' }); } catch { return iso; } }
  function fmtDuration(ms) { if (!ms || ms < 0) return '—'; const totalSec = Math.floor(ms / 1000); if (totalSec < 60) return totalSec + 's'; const min = Math.floor(totalSec / 60); const sec = totalSec % 60; return min + 'm ' + sec + 's'; }
  function getSymbol(s) { return s.replace('USDT',''); }
  function formatPriceShort(value, tick) { if (!tick) return value.toFixed(2); const decimals = Math.max(0, Math.ceil(-Math.log10(tick))); return value.toFixed(decimals); }

  // ================================================================

  function calcRSI(closes, p=14) { /* ... same as before ... */ }
  function calcBB(closes, p=20, sd=2) { /* ... same as before ... */ }
  function calcVWAP(highs, lows, closes, vols) { /* ... same as before ... */ }
  function calcATR(highs, lows, closes, period = 14) { /* ... same as before ... */ }

  // ================================================================
  //  ENHANCED ANALYSIS (unchanged)
  // ================================================================

  // ================================================================
  //  DYNAMIC TP/SL (unchanged)
  // ================================================================
  function generateSignalParams(symbol, price, direction, atr) { /* ... same ATR‑based logic ... */ }

  // ================================================================
  //  FETCH COINS WITH CACHE (unchanged)
  // ================================================================
  const analysisCache = new Map();
  async function fetchAllCoins() { /* ... same implementation ... */ }

  // ================================================================
  //  GOOGLE SHEETS (unchanged)
  // ================================================================
  let lastSheetError = null;
  async function addSignalToSheet(signal) { /* ... */ }
  async function updateSignalStatus(id, status, closedPrice, closeTime) { /* ... */ }
  async function fetchHistoryFromSheet() { /* ... */ }

  //  LOCAL STORAGE (unchanged)

  function getLocalHistory() { /* ... */ }
  function saveLocalHistory(h) { /* ... */ }

  // ================================================================
  //  CORE LOGIC (unchanged, includes signal expiry)
  // ================================================================
  let isProcessing = false;
  const activeSignals = new Map();
  function generateId() { return 'sig_' + Date.now() + '_' + Math.random().toString(36).substr(2,4); }

  async function processScan() { /* ... same robust scan with TP/SL/expiry ... */ }

  // ================================================================
  //  RENDER FUNCTIONS (confidence bar, mobile‑friendly)
  // ================================================================
  function renderSignals(signals) {
    if (!signals || signals.length === 0) {
      signalsGrid.innerHTML = `<div class="empty-state">No active signals. Waiting...</div>`;
      return;
    }
    let html = '';
    const maxDisplay = 10;
    const displayed = signals.slice(0, maxDisplay);
    displayed.forEach(s => {
      const dirClass = s.direction.toLowerCase();
      const dirDisplay = s.direction === 'LONG' ? '▲' : '▼';
      const tick = s.tick || 0.01;
      const confidence = s.strength || 0;
      let confClass = 'low';
      if (confidence >= 80) confClass = 'high';
      else if (confidence >= 60) confClass = 'medium';

      html += `
        <div class="signal-row ${dirClass}">
          <span class="col-sym">${getSymbol(s.symbol)}</span>
          <span class="col-dir ${dirClass}">${dirDisplay}</span>
          <span class="col-price">${formatPrice(s.livePrice, tick)}</span>
          <span class="col-entry">${formatPriceShort(s.entryLow, tick)} – ${formatPriceShort(s.entryHigh, tick)}</span>
          <span class="col-tp">${formatPriceShort(s.tp, tick)}</span>
          <span class="col-sl">${formatPriceShort(s.sl, tick)}</span>
          <span class="col-conf ${confClass}">
            <div class="conf-bar-container">
              <div class="conf-bar ${confClass}" style="width:${confidence}%"></div>
            </div>
            ${confidence}%
          </span>
          <span class="col-time">${fmtTime(s.timestamp)}</span>
        </div>
      `;
    });
    if (signals.length > maxDisplay) {
      html += `<div class="empty-state" style="padding:8px;">+ ${signals.length - maxDisplay} more signals not shown</div>`;
    }
    signalsGrid.innerHTML = html;
  }

  function renderHistory(history) {
    const closedTrades = history.filter(h => h.status === 'PROFIT' || h.status === 'LOSS' || h.status === 'EXPIRED');
    if (!closedTrades || closedTrades.length === 0) {
      historyList.innerHTML = `<div class="empty-state">No completed trades yet.</div>`;
      historyCount.textContent = '0 entries';
      return;
    }
    const sorted = closedTrades.sort((a, b) => (b.closeTime || 0) - (a.closeTime || 0)).slice(0, 50);
    historyCount.textContent = sorted.length + ' entries';
    let html = '';
    for (const h of sorted) {
      const dirClass = h.direction ? h.direction.toLowerCase() : 'neutral';
      const tick = h.tick || 0.01;
      let resultText = '—', resultClass = '';
      if (h.status === 'PROFIT') { resultText = '✅ TP'; resultClass = 'win'; }
      else if (h.status === 'LOSS') { resultText = '❌ SL'; resultClass = 'loss'; }
      else if (h.status === 'EXPIRED') { resultText = '⏰ Exp'; resultClass = 'loss'; }
      let durationStr = '—', durClass = '';
      if (h.openTime && h.closeTime) {
        const durMs = h.closeTime - h.openTime;
        durationStr = fmtDuration(durMs);
        if (durMs < 120000) durClass = 'fast';
        else if (durMs < 600000) durClass = 'medium';
        else durClass = 'slow';
      }
      const priceDisplay = h.closedPrice ? formatPrice(h.closedPrice, tick) : '—';
      html += `
        <div class="history-item">
          <span class="h-sym">${getSymbol(h.symbol)}</span>
          <span class="h-dir ${dirClass}">${h.direction === 'LONG' ? 'L' : 'S'}</span>
          <span class="h-time">${fmtTime(h.timestamp)}</span>
          <span class="h-duration ${durClass}">${durationStr}</span>
          <span class="h-result ${resultClass}">${resultText}</span>
          <span class="h-price">${priceDisplay}</span>
        </div>
      `;
    }
    historyList.innerHTML = html;
  }

  // ================================================================
  //  SYNC & AUTO REFRESH (unchanged)
  // ================================================================
  async function syncRemoteHistory() { /* ... */ }
  let scanInterval = null, historyInterval = null;
  async function fullUpdate() { await processScan(); await syncRemoteHistory(); }
  function startAutoRefresh() {
    if (scanInterval) clearInterval(scanInterval);
    if (historyInterval) clearInterval(historyInterval);
    fullUpdate();
    scanInterval = setInterval(processScan, SCAN_INTERVAL);
    historyInterval = setInterval(() => { const hist = getLocalHistory(); renderHistory(hist); }, HISTORY_INTERVAL);
  }
  refreshBtn.addEventListener('click', () => {
    if (scanInterval) clearInterval(scanInterval);
    if (historyInterval) clearInterval(historyInterval);
    fullUpdate().finally(() => startAutoRefresh());
  });
  startAutoRefresh();
</script>

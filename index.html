<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <title>ScalpScanner Pro - Live Signals</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
    body { background: #090d14; min-height: 100vh; padding: 12px; display: flex; justify-content: center; }
    .app { max-width: 900px; width: 100%; }
    
    /* Header & Badges */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
    .header h1 { color: #f0f4fa; font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 10px; white-space: nowrap; }
    .header h1 span { background: linear-gradient(135deg, #33d9a8, #1db883); font-size: 12px; font-weight: 600; padding: 2px 12px; border-radius: 30px; color: #090d14; }
    .badge { background: #161f2b; padding: 5px 14px; border-radius: 40px; color: #9ab0c9; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 8px; border: 1px solid #253240; white-space: nowrap; }
    .badge .dot { width: 7px; height: 7px; background: #33d9a8; border-radius: 50%; display: inline-block; animation: pulse-dot 1.6s infinite; }
    @keyframes pulse-dot { 0% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.3; transform: scale(0.9); } }
    
    /* Top Bar */
    .top-bar { display: flex; justify-content: space-between; align-items: center; background: #111a24; padding: 10px 16px; border-radius: 14px; border: 1px solid #1e2c3b; margin-bottom: 16px; flex-wrap: wrap; gap: 6px; }
    .top-bar .status { color: #7a94af; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .top-bar .status .live { color: #33d9a8; font-weight: 600; }
    
    /* Container Styles */
    .signals-container, .history-section { background: #111a24; border-radius: 16px; border: 1px solid #1e2c3b; overflow: hidden; margin-bottom: 24px; }
    .history-section { padding-top: 12px; }
    
    /* Grid Headers */
    .signals-header { display: grid; grid-template-columns: 70px 50px 1fr 80px 80px 80px; gap: 8px; padding: 10px 14px; background: #0a111a; border-bottom: 1px solid #1e2c3b; color: #5f7d9a; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .history-header { display: flex; justify-content: space-between; align-items: center; padding: 0 14px 10px 14px; flex-wrap: wrap; gap: 6px; }
    .history-header h3 { color: #9ab0c9; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    
    /* Grid Lists */
    .signals-grid, .history-list { display: flex; flex-direction: column; max-height: 420px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .history-list { max-height: 340px; padding-bottom: 4px; }
    .signals-grid::-webkit-scrollbar, .history-list::-webkit-scrollbar { width: 4px; }
    .signals-grid::-webkit-scrollbar-track, .history-list::-webkit-scrollbar-track { background: #0a111a; }
    .signals-grid::-webkit-scrollbar-thumb, .history-list::-webkit-scrollbar-thumb { background: #2d3f52; border-radius: 4px; }
    
    /* Rows */
    .signal-row { display: grid; grid-template-columns: 70px 50px 1fr 80px 80px 80px; gap: 8px; padding: 12px 14px; align-items: center; border-bottom: 1px solid #1a2533; font-size: 13px; transition: background 0.15s; background: #111a24; min-height: 48px; }
    .history-item { display: grid; grid-template-columns: 70px 50px 100px 1fr 100px; gap: 8px; padding: 10px 14px; font-size: 12px; align-items: center; border-bottom: 1px solid #1a2533; background: #111a24; min-height: 44px; }
    .signal-row:last-child, .history-item:last-child { border-bottom: none; }
    .signal-row:hover, .history-item:hover { background: #1a2633; }
    
    /* Cell Typography */
    .col-sym, .h-sym { font-weight: 700; color: #f0f4fa; font-size: 14px; }
    .col-dir, .h-dir { font-weight: 700; font-size: 13px; text-align: left; }
    .col-dir.long, .h-dir.long { color: #33d9a8; }
    .col-dir.short, .h-dir.short { color: #f25b6a; }
    .col-entry { color: #9ab0c9; font-size: 13px; white-space: nowrap; }
    .col-tp { color: #33d9a8; font-weight: 500; font-size: 13px; }
    .col-sl { color: #f25b6a; font-weight: 500; font-size: 13px; }
    .col-time, .h-time { color: #5f7d9a; font-size: 11px; text-align: right; white-space: nowrap; }
    
    .h-result { font-weight: 700; font-size: 12px; text-align: center; }
    .h-result.win { color: #33d9a8; }
    .h-result.loss { color: #f25b6a; }
    .h-price { font-size: 12px; color: #7a94af; text-align: right; white-space: nowrap; }
    
    .signal-row.long { border-left: 3px solid #33d9a8; }
    .signal-row.short { border-left: 3px solid #f25b6a; }
    .empty-state { color: #5f7d9a; text-align: center; padding: 28px 10px; font-size: 13px; }

    /* Mobile Responsive Logic */
    @media (max-width: 650px) {
      .signals-header { display: none; }
      .signal-row { grid-template-columns: 1fr 1fr; grid-template-rows: auto auto auto; gap: 6px 12px; padding: 12px; border-left: 3px solid transparent; }
      .signal-row.long { border-left-color: #33d9a8; }
      .signal-row.short { border-left-color: #f25b6a; }
      .signal-row .col-sym { grid-column: 1 / 2; grid-row: 1 / 2; font-size: 16px; }
      .signal-row .col-dir { grid-column: 2 / 3; grid-row: 1 / 2; text-align: right;}
      .signal-row .col-entry { grid-column: 1 / 3; grid-row: 2 / 3; font-size: 12px; }
      .signal-row .col-tp { grid-column: 1 / 2; grid-row: 3 / 4; font-size: 12px; }
      .signal-row .col-sl { grid-column: 2 / 3; grid-row: 3 / 4; text-align: right; font-size: 12px;}
      .signal-row .col-time { display: none; }
      
      .history-item { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto auto; gap: 4px 8px; padding: 10px; }
      .history-item .h-sym { grid-column: 1 / 2; grid-row: 1 / 2; font-size: 14px; }
      .history-item .h-dir { grid-column: 2 / 3; grid-row: 1 / 2; text-align: center; }
      .history-item .h-time { grid-column: 3 / 4; grid-row: 1 / 2; text-align: right; }
      .history-item .h-result { grid-column: 1 / 3; grid-row: 2 / 3; text-align: left; }
      .history-item .h-price { grid-column: 3 / 4; grid-row: 2 / 3; text-align: right; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📡 ScalpScanner <span>LIVE</span></h1>
    <span class="badge"><span class="dot"></span> <span id="liveCount">0</span> active trades</span>
  </div>
  
  <div class="top-bar">
    <span class="status">🟢 <span class="live">Live</span> · WebSocket Connected</span>
    <span class="status" id="lastUpdated">Waiting for signals...</span>
  </div>
  
  <div class="signals-container">
    <div class="signals-header">
      <span>Coin</span> <span>Dir</span> <span>Entry Range</span> <span>Target (TP)</span> <span>Risk (SL)</span> <span>Time</span>
    </div>
    <div class="signals-grid" id="activeList">
      <div class="empty-state">Loading active market data...</div>
    </div>
  </div>

  <div class="history-section">
    <div class="history-header">
      <h3>📜 Trade History (Last 50)</h3>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-state">Loading history...</div>
    </div>
  </div>
</div>

<!-- FIREBASE SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // Your web app's real Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyC1zcOaqRf9_zHylKg_ERfAzl6rnYOKAi0",
    authDomain: "scalpscanner-74a22.firebaseapp.com",
    databaseURL: "https://scalpscanner-74a22-default-rtdb.firebaseio.com",
    projectId: "scalpscanner-74a22",
    storageBucket: "scalpscanner-74a22.firebasestorage.app",
    messagingSenderId: "265105859600",
    appId: "1:265105859600:web:3c00612e48453274c25695"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const activeList = document.getElementById('activeList');
  const historyList = document.getElementById('historyList');
  const liveCount = document.getElementById('liveCount');
  const lastUpdated = document.getElementById('lastUpdated');

  function fmtTime(iso) { 
    if (!iso) return '—'; 
    try { const d = new Date(iso); return d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); } 
    catch { return iso; } 
  }

  // Real-time listener for the "signals" collection
  const q = query(collection(db, "signals"), orderBy("timestamp", "desc"), limit(50));
  
  onSnapshot(q, (snapshot) => {
    const active = [];
    const history = [];

    snapshot.forEach((doc) => {
      const data = doc.data();
      if (data.status === 'OPEN') {
        active.push(data);
      } else {
        history.push(data);
      }
    });

    // Sort history by close time (newest closed trades first)
    history.sort((a, b) => parseInt(b.closeTime || 0) - parseInt(a.closeTime || 0));

    liveCount.innerText = active.length;
    lastUpdated.innerText = "Updated: " + new Date().toLocaleTimeString();
    
    renderActive(active);
    renderHistory(history);
  }, (error) => {
    console.error("Firebase Snapshot Error: ", error);
    activeList.innerHTML = `<div class="empty-state" style="color: #f25b6a;">Error connecting to database. Please refresh.</div>`;
  });

  function renderActive(trades) {
    if (trades.length === 0) {
      activeList.innerHTML = `<div class="empty-state">No active trades currently open. Waiting for setups...</div>`;
      return;
    }
    
    let html = '';
    trades.forEach(t => {
      const dir = (t.direction || '').toUpperCase();
      const dirClass = dir.toLowerCase();
      // Handle both entryMin (backend) and entryLow (legacy) variables
      const entryLow = t.entryMin || t.entryLow || 0;
      const entryHigh = t.entryMax || t.entryHigh || 0;
      
      html += `
        <div class="signal-row ${dirClass}">
          <span class="col-sym">${(t.symbol || '').replace('USDT', '')}</span>
          <span class="col-dir ${dirClass}">${dir === 'LONG' ? '▲ LONG' : '▼ SHORT'}</span>
          <span class="col-entry">$${parseFloat(entryLow).toFixed(4)} – $${parseFloat(entryHigh).toFixed(4)}</span>
          <span class="col-tp">TP: $${parseFloat(t.tp || 0).toFixed(4)}</span>
          <span class="col-sl">SL: $${parseFloat(t.sl || 0).toFixed(4)}</span>
          <span class="col-time">${fmtTime(t.timestamp)}</span>
        </div>
      `;
    });
    activeList.innerHTML = html;
  }

  function renderHistory(trades) {
    if (trades.length === 0) {
      historyList.innerHTML = `<div class="empty-state">No completed trades yet.</div>`;
      return;
    }

    let html = '';
    trades.forEach(t => {
      const dir = (t.direction || '').toUpperCase();
      const status = (t.status || '').toUpperCase();
      
      let resText = '—', resClass = '';
      if (status === 'PROFIT') { resText = '✅ TP Hit'; resClass = 'win'; }
      else if (status === 'LOSS') { resText = '❌ SL Hit'; resClass = 'loss'; }
      else if (status === 'EXPIRED') { resText = '⏰ Expired'; resClass = 'loss'; }

      html += `
        <div class="history-item">
          <span class="h-sym">${(t.symbol || '').replace('USDT', '')}</span>
          <span class="h-dir ${dir.toLowerCase()}">${dir === 'LONG' ? 'LONG' : 'SHORT'}</span>
          <span class="h-time">${fmtTime(t.timestamp)}</span>
          <span class="h-result ${resClass}">${resText}</span>
          <span class="h-price">$${parseFloat(t.closedPrice || 0).toFixed(4)}</span>
        </div>
      `;
    });
    historyList.innerHTML = html;
  }
</script>
</body>
</html>

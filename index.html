<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>ScalpScanner Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
    body { background: #090d14; min-height: 100vh; padding: 12px; display: flex; justify-content: center; }
    .app { max-width: 900px; width: 100%; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
    .header h1 { color: #f0f4fa; font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    .header h1 span { background: linear-gradient(135deg, #33d9a8, #1db883); font-size: 12px; font-weight: 600; padding: 2px 12px; border-radius: 30px; color: #090d14; }
    .badge { background: #161f2b; padding: 5px 14px; border-radius: 40px; color: #9ab0c9; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 8px; border: 1px solid #253240; }
    .badge .dot { width: 7px; height: 7px; background: #33d9a8; border-radius: 50%; display: inline-block; animation: pulse-dot 1.6s infinite; }
    @keyframes pulse-dot { 0% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.3; transform: scale(0.9); } }
    .top-bar { display: flex; justify-content: space-between; align-items: center; background: #111a24; padding: 8px 16px; border-radius: 14px; border: 1px solid #1e2c3b; margin-bottom: 16px; flex-wrap: wrap; gap: 6px; }
    .top-bar .status { color: #7a94af; font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .top-bar .status .live { color: #33d9a8; font-weight: 600; }
    .top-bar .status .error { color: #f25b6a; font-weight: 600; }
    .refresh-btn { background: #1e2c3b; border: none; color: #d6e4f0; padding: 4px 16px; border-radius: 30px; font-size: 12px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; border: 1px solid #2d3f52; transition: 0.2s; }
    .refresh-btn:hover:not(:disabled) { background: #2d3f52; }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .refresh-btn .spinner { width: 12px; height: 12px; border: 2px solid #5f7d9a; border-top-color: #d6e4f0; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .signals-container { background: #111a24; border-radius: 16px; border: 1px solid #1e2c3b; overflow: hidden; margin-bottom: 24px; }
    .signals-header { display: grid; grid-template-columns: 50px 40px 80px 1fr 80px 80px 100px 70px; gap: 4px; padding: 8px 12px; background: #0a111a; border-bottom: 1px solid #1e2c3b; color: #5f7d9a; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .signals-grid { display: flex; flex-direction: column; max-height: 420px; overflow-y: auto; }
    .signals-grid::-webkit-scrollbar { width: 4px; }
    .signals-grid::-webkit-scrollbar-track { background: #0a111a; }
    .signals-grid::-webkit-scrollbar-thumb { background: #2d3f52; border-radius: 4px; }
    .signal-row {
      display: grid; grid-template-columns: 50px 40px 80px 1fr 80px 80px 100px 70px; gap: 4px;
      padding: 6px 12px; align-items: center; border-bottom: 1px solid #1a2533;
      font-size: 13px; transition: background 0.15s; background: #111a24;
    }
    .signal-row:hover { background: #1a2633; }
    .signal-row .col-sym { font-weight: 700; color: #f0f4fa; font-size: 14px; }
    .signal-row .col-dir { font-weight: 700; font-size: 13px; text-align: center; }
    .signal-row .col-dir.long { color: #33d9a8; }
    .signal-row .col-dir.short { color: #f25b6a; }
    .signal-row .col-price { color: #d6e4f0; font-weight: 500; white-space: nowrap; }
    .signal-row .col-entry { color: #9ab0c9; font-size: 12px; white-space: nowrap; }
    .signal-row .col-tp { color: #33d9a8; font-weight: 500; font-size: 12px; }
    .signal-row .col-sl { color: #f25b6a; font-weight: 500; font-size: 12px; }
    .signal-row .col-conf { font-weight: 700; font-size: 13px; text-align: center; display: flex; align-items: center; gap: 4px; justify-content: center; }
    .conf-bar-container { width: 40px; height: 4px; background: #1e2c3b; border-radius: 2px; overflow: hidden; }
    .conf-bar { height: 100%; border-radius: 2px; }
    .conf-bar.high { background: #33d9a8; }
    .conf-bar.medium { background: #f4c95d; }
    .conf-bar.low { background: #f25b6a; }
    .signal-row .col-time { color: #5f7d9a; font-size: 11px; text-align: right; white-space: nowrap; }
    .signal-row.long { border-left: 3px solid #33d9a8; }
    .signal-row.short { border-left: 3px solid #f25b6a; }
    .empty-state { color: #5f7d9a; text-align: center; padding: 28px 10px; font-size: 13px; }

    .history-section { background: #111a24; border-radius: 16px; padding: 12px 0 0 0; border: 1px solid #1e2c3b; overflow: hidden; }
    .history-header { display: flex; justify-content: space-between; align-items: center; padding: 0 14px 10px 14px; }
    .history-header h3 { color: #9ab0c9; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .history-header .count { background: #1a2430; padding: 1px 12px; border-radius: 30px; font-size: 11px; color: #7a94af; }
    .history-list { display: flex; flex-direction: column; max-height: 340px; overflow-y: auto; padding: 0 4px 4px 4px; }
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-track { background: #0a111a; border-radius: 4px; }
    .history-list::-webkit-scrollbar-thumb { background: #2d3f52; border-radius: 4px; }
    .history-item {
      display: grid; grid-template-columns: 45px 30px 55px 60px 75px 55px;
      gap: 4px 6px; padding: 5px 10px; font-size: 12px; align-items: center;
      border-bottom: 1px solid #1a2533; background: #111a24;
    }
    .history-item:hover { background: #1a2633; }
    .history-item .h-sym { font-weight: 700; color: #f0f4fa; font-size: 13px; }
    .history-item .h-dir { font-weight: 600; font-size: 11px; text-align: center; }
    .history-item .h-dir.long { color: #33d9a8; }
    .history-item .h-dir.short { color: #f25b6a; }
    .history-item .h-time { color: #5f7d9a; font-size: 10px; white-space: nowrap; }
    .history-item .h-duration { font-size: 10px; font-weight: 600; text-align: center; background: #1a2430; padding: 1px 6px; border-radius: 20px; white-space: nowrap; }
    .history-item .h-duration.fast { color: #33d9a8; }
    .history-item .h-duration.medium { color: #f4c95d; }
    .history-item .h-duration.slow { color: #f25b6a; }
    .history-item .h-result { font-weight: 700; font-size: 12px; text-align: center; }
    .history-item .h-result.win { color: #33d9a8; }
    .history-item .h-result.loss { color: #f25b6a; }
    .history-item .h-price { font-size: 10px; color: #7a94af; text-align: right; white-space: nowrap; }

    @media (max-width: 700px) {
      .signals-header { display: none; }
      .signal-row { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto auto auto; gap: 2px 8px; padding: 8px 12px; border-left: 3px solid transparent; }
      .signal-row.long { border-left-color: #33d9a8; }
      .signal-row.short { border-left-color: #f25b6a; }
      .signal-row .col-sym { grid-column: 1 / 2; grid-row: 1 / 2; font-size: 16px; }
      .signal-row .col-dir { grid-column: 2 / 3; grid-row: 1 / 2; text-align: left; }
      .signal-row .col-price { grid-column: 3 / 4; grid-row: 1 / 2; text-align: right; font-size: 14px; }
      .signal-row .col-entry { grid-column: 1 / 3; grid-row: 2 / 3; font-size: 11px; color: #7a94af; }
      .signal-row .col-tp { grid-column: 1 / 2; grid-row: 3 / 4; font-size: 11px; }
      .signal-row .col-sl { grid-column: 2 / 3; grid-row: 3 / 4; font-size: 11px; }
      .signal-row .col-conf { grid-column: 3 / 4; grid-row: 3 / 4; font-size: 14px; text-align: right; justify-content: flex-end; }
      .signal-row .col-time { display: none; }
      .history-item { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto auto; gap: 2px 6px; padding: 6px 10px; }
      .history-item .h-sym { grid-column: 1 / 2; grid-row: 1 / 2; font-size: 14px; }
      .history-item .h-dir { grid-column: 2 / 3; grid-row: 1 / 2; text-align: left; }
      .history-item .h-time { grid-column: 3 / 4; grid-row: 1 / 2; text-align: right; }
      .history-item .h-duration { grid-column: 1 / 2; grid-row: 2 / 3; text-align: left; background: none; padding: 0; }
      .history-item .h-result { grid-column: 2 / 3; grid-row: 2 / 3; text-align: left; }
      .history-item .h-price { grid-column: 3 / 4; grid-row: 2 / 3; text-align: right; }
      .history-item .h-duration.fast, .history-item .h-duration.medium, .history-item .h-duration.slow { background: none; padding: 0; }
    }
    @media (max-width: 420px) {
      .signal-row .col-sym { font-size: 14px; }
      .signal-row .col-price { font-size: 12px; }
      .header h1 { font-size: 18px; }
      .badge { font-size: 10px; padding: 3px 10px; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📡 ScalpScanner <span>PRO</span></h1>
    <span class="badge"><span class="dot"></span> <span id="liveCount">0</span> active</span>
  </div>

  <div class="top-bar">
    <span class="status" id="statusText">🟢 <span class="live">Live</span> · scanning...</span>
    <button class="refresh-btn" id="refreshBtn">⟳ Refresh</button>
  </div>

  <div class="signals-container">
    <div class="signals-header">
      <span>Coin</span> <span>Dir</span> <span>Price</span> <span>Entry Range</span>
      <span>TP</span> <span>SL</span> <span>Confidence</span> <span>Time</span>
    </div>
    <div class="signals-grid" id="signalsGrid">
      <div class="empty-state">No active signals. Waiting for setup...</div>
    </div>
  </div>

  <div class="history-section">
    <div class="history-header">
      <h3>📜 Trade History (Closed)</h3>
      <span class="count" id="historyCount">0 entries</span>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-state">No completed trades yet.</div>
    </div>
  </div>
</div>

<script>
  // ================================================================
  //  CONFIG
  // ================================================================
  const GOOGLE_SCRIPT_URL =
    'https://script.google.com/macros/s/AKfycbw_Dm7ShMbtispqIZAGen1g9ZKHbaMYGLuJuipsliNv6bD_4vx0fsEOo2V2CdE5HzdH/exec';

  const TICK_SIZE = {
    'BTCUSDT': 0.01, 'ETHUSDT': 0.01, 'BNBUSDT': 0.01,
    'SOLUSDT': 0.001, 'AVAXUSDT': 0.001, 'DOTUSDT': 0.001, 'LINKUSDT': 0.001,
    'XRPUSDT': 0.0001, 'ADAUSDT': 0.0001, 'DOGEUSDT': 0.00001
  };
  const COINS = ['BTCUSDT','ETHUSDT','BNBUSDT','SOLUSDT','XRPUSDT','ADAUSDT','DOGEUSDT','AVAXUSDT','DOTUSDT','LINKUSDT'];
  const SCAN_INTERVAL = 15000;
  const HISTORY_INTERVAL = 30000;
  const SIGNAL_EXPIRY_MINUTES = 30;   // signals expire after 30 minutes if not hit

  const $ = id => document.getElementById(id);
  const signalsGrid = $('signalsGrid');
  const historyList = $('historyList');
  const statusText = $('statusText');
  const refreshBtn = $('refreshBtn');
  const liveCount = $('liveCount');
  const historyCount = $('historyCount');

  // ================================================================
  //  HELPERS
  // ================================================================
  function getTick(symbol) { return TICK_SIZE[symbol] || 0.01; }
  function roundToTick(value, tick) { const factor = 1 / tick; return Math.round(value * factor) / factor; }
  function formatPrice(value, tick) { if (!tick) return '$' + value.toFixed(2); const decimals = Math.max(0, Math.ceil(-Math.log10(tick))); return '$' + value.toFixed(decimals); }
  function fmtTime(iso) { if (!iso) return '—'; try { const d = new Date(iso); return d.toLocaleTimeString('en-US', { hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' }); } catch { return iso; } }
  function fmtDuration(ms) { if (!ms || ms < 0) return '—'; const totalSec = Math.floor(ms / 1000); if (totalSec < 60) return totalSec + 's'; const min = Math.floor(totalSec / 60); const sec = totalSec % 60; return min + 'm ' + sec + 's'; }
  function getSymbol(s) { return s.replace('USDT',''); }
  function formatPriceShort(value, tick) { if (!tick) return value.toFixed(2); const decimals = Math.max(0, Math.ceil(-Math.log10(tick))); return value.toFixed(decimals); }

  // ================================================================
  //  TECHNICAL INDICATORS
  // ================================================================
  function calcEMA(data, p) {
    const ema = [], k = 2/(p+1);
    let sum = 0;
    for (let i=0; i<data.length; i++) {
      if (i < p-1) { sum += data[i]; ema.push(null); }
      else if (i === p-1) { sum += data[i]; ema.push(sum/p); }
      else { ema.push(data[i]*k + ema[i-1]*(1-k)); }
    }
    return ema;
  }

  function calcRSI(closes, p=14) {
    const rsi = [];
    let gain=0, loss=0;
    for (let i=1; i<closes.length; i++) {
      const diff = closes[i] - closes[i-1];
      if (i <= p) {
        if (diff>=0) gain += diff; else loss += Math.abs(diff);
        if (i === p) {
          let ag = gain/p, al = loss/p;
          const rs = al===0 ? 0 : ag/al;
          rsi.push(al===0 ? 100 : 100 - (100/(1+rs)));
        } else rsi.push(null);
      } else {
        const ag = ((gain*(p-1)) + (diff>=0 ? diff : 0))/p;
        const al = ((loss*(p-1)) + (diff<0 ? Math.abs(diff) : 0))/p;
        gain = ag*p; loss = al*p;
        const rs = al===0 ? 0 : ag/al;
        rsi.push(al===0 ? 100 : 100 - (100/(1+rs)));
      }
    }
    return rsi;
  }

  function calcBB(closes, p=20, sd=2) {
    const upper=[], lower=[];
    for (let i=0; i<closes.length; i++) {
      if (i < p-1) { upper.push(null); lower.push(null); continue; }
      let sum=0;
      for (let j=i-p+1; j<=i; j++) sum += closes[j];
      const mean = sum/p;
      let sq=0;
      for (let j=i-p+1; j<=i; j++) sq += (closes[j]-mean)**2;
      const stdev = Math.sqrt(sq/p);
      upper.push(mean + sd*stdev);
      lower.push(mean - sd*stdev);
    }
    return { upper, lower };
  }

  function calcVWAP(highs, lows, closes, vols) {
    const vwap = [];
    let cumPV=0, cumVol=0;
    for (let i=0; i<closes.length; i++) {
      const typical = (highs[i]+lows[i]+closes[i])/3;
      cumPV += typical * vols[i];
      cumVol += vols[i];
      vwap.push(cumVol===0 ? null : cumPV/cumVol);
    }
    return vwap;
  }

  function calcATR(highs, lows, closes, period = 14) {
    const atr = [];
    if (highs.length < 2) return atr;
    const trueRanges = [];
    for (let i = 1; i < highs.length; i++) {
      const tr = Math.max(
        highs[i] - lows[i],
        Math.abs(highs[i] - closes[i-1]),
        Math.abs(lows[i] - closes[i-1])
      );
      trueRanges.push(tr);
    }
    // Wilder's smoothing
    let atrSum = 0;
    for (let i = 0; i < period && i < trueRanges.length; i++) {
      atrSum += trueRanges[i];
      atr.push(null);
    }
    if (trueRanges.length >= period) {
      let prevATR = atrSum / period;
      atr[period-1] = prevATR;
      for (let i = period; i < trueRanges.length; i++) {
        prevATR = (prevATR * (period - 1) + trueRanges[i]) / period;
        atr.push(prevATR);
      }
    }
    return atr;
  }

  // ================================================================
  //  ENHANCED ANALYSIS WITH WEIGHTED CONFIDENCE
  // ================================================================
  function analyzeCoin(data, symbol) {
    const closes = data.map(d=>d.close);
    const highs = data.map(d=>d.high);
    const lows = data.map(d=>d.low);
    const vols = data.map(d=>d.volume);
    const len = closes.length;
    if (len < 60) return null;

    const ema5 = calcEMA(closes,5);
    const ema20 = calcEMA(closes,20);
    const rsi = calcRSI(closes,14);
    const bb = calcBB(closes,20,2);
    const vwap = calcVWAP(highs,lows,closes,vols);
    const atr = calcATR(highs,lows,closes,14);

    const idx = len-1;
    const price = closes[idx];
    const e5 = ema5[idx], e20 = ema20[idx];
    const r = rsi[idx];
    const upper = bb.upper[idx], lower = bb.lower[idx];
    const vwapVal = vwap[idx];
    const vol = vols[idx];
    const avgVol = vols.slice(-20).reduce((a,b)=>a+b,0)/20;
    const volSpike = vol > avgVol * 1.8;
    const currentATR = atr[idx];

    // Weight definitions (total 1.0 without bonus)
    const WEIGHTS = {
      EMA: 0.20,
      RSI: 0.20,
      BB: 0.15,
      VWAP: 0.15,
      VOLUME: 0.10,
      STRENGTH_BONUS: 0.20   // distributed in the chosen direction
    };

    let longScore = 0, shortScore = 0;
    const conditions = { EMA: false, RSI: false, BB: false, VWAP: false, VOL: false };

    // EMA crossover
    if (e5 !== null && e20 !== null) {
      if (e5 > e20) { longScore += WEIGHTS.EMA; conditions.EMA = true; }
      else if (e5 < e20) { shortScore += WEIGHTS.EMA; conditions.EMA = true; }
    }

    // RSI extremes
    if (r !== null) {
      if (r < 30) { longScore += WEIGHTS.RSI; conditions.RSI = true; }
      else if (r > 70) { shortScore += WEIGHTS.RSI; conditions.RSI = true; }
    }

    // Bollinger Bands
    if (lower !== null && price < lower * 1.005) { longScore += WEIGHTS.BB; conditions.BB = true; }
    if (upper !== null && price > upper * 0.995) { shortScore += WEIGHTS.BB; conditions.BB = true; }

    // VWAP relation
    if (vwapVal !== null) {
      if (price > vwapVal) { longScore += WEIGHTS.VWAP; conditions.VWAP = true; }
      if (price < vwapVal) { shortScore += WEIGHTS.VWAP; conditions.VWAP = true; }
    }

    // Volume spike (symmetric)
    if (volSpike) { longScore += WEIGHTS.VOLUME; shortScore += WEIGHTS.VOLUME; conditions.VOL = true; }

    // Determine direction and add strength bonus
    let direction = 'NEUTRAL';
    let finalConfidence = 0;
    if (longScore >= shortScore && longScore > 0) {
      direction = 'LONG';
      finalConfidence = longScore;
      // Bonus for strong signals
      if (r !== null && r < 25) finalConfidence += 0.05;
      if (volSpike) finalConfidence += 0.05;
      if (e5 && e20 && (e5 - e20) / e20 > 0.005) finalConfidence += 0.05;
    } else if (shortScore > longScore && shortScore > 0) {
      direction = 'SHORT';
      finalConfidence = shortScore;
      if (r !== null && r > 75) finalConfidence += 0.05;
      if (volSpike) finalConfidence += 0.05;
      if (e5 && e20 && (e20 - e5) / e20 > 0.005) finalConfidence += 0.05;
    } else {
      return null;
    }

    // Cap at 1.0 (100%)
    finalConfidence = Math.min(finalConfidence, 1.0);
    const confidencePercent = Math.round(finalConfidence * 100);

    const condDisplay = {
      EMA: conditions.EMA ? '✓' : '✗',
      RSI: conditions.RSI ? '✓' : '✗',
      BB: conditions.BB ? '✓' : '✗',
      VWAP: conditions.VWAP ? '✓' : '✗',
      VOL: conditions.VOL ? '✓' : '✗'
    };

    return {
      direction,
      strength: confidencePercent,   // percentage 0-100
      price,
      condDisplay,
      atr: currentATR                // used for dynamic TP/SL
    };
  }

  // ================================================================
  //  DYNAMIC TP/SL BASED ON ATR
  // ================================================================
  function generateSignalParams(symbol, price, direction, atr) {
    const tick = getTick(symbol);
    // Use ATR as volatility measure, fallback to 0.3% of price
    const volatility = atr && atr > 0 ? atr : price * 0.003;

    const tpMultiplier = 1.5;
    const slMultiplier = 1.0;
    const spreadMultiplier = 0.5;

    const spread = roundToTick(volatility * spreadMultiplier, tick);
    let entryLow, entryHigh, tp, sl;

    if (direction === 'LONG') {
      entryLow = roundToTick(price - spread, tick);
      entryHigh = roundToTick(price + spread, tick);
      tp = roundToTick(entryHigh + volatility * tpMultiplier, tick);
      sl = roundToTick(entryLow - volatility * slMultiplier, tick);
    } else {
      entryLow = roundToTick(price - spread, tick);
      entryHigh = roundToTick(price + spread, tick);
      tp = roundToTick(entryLow - volatility * tpMultiplier, tick);
      sl = roundToTick(entryHigh + volatility * slMultiplier, tick);
    }

    // Ensure TP and SL are not inside entry zone
    if (direction === 'LONG') {
      if (tp <= entryHigh) tp = roundToTick(entryHigh + tick, tick);
      if (sl >= entryLow) sl = roundToTick(entryLow - tick, tick);
    } else {
      if (tp >= entryLow) tp = roundToTick(entryLow - tick, tick);
      if (sl <= entryHigh) sl = roundToTick(entryHigh + tick, tick);
    }

    const actualTpMove = Math.abs(tp - (direction === 'LONG' ? entryHigh : entryLow));
    const actualSlMove = Math.abs(sl - (direction === 'LONG' ? entryLow : entryHigh));
    const rr = actualSlMove > 0 ? actualTpMove / actualSlMove : 0;

    return { entryLow, entryHigh, tp, sl, rr, tick };
  }

  // ================================================================
  //  FETCH COINS WITH CACHED ANALYSIS
  // ================================================================
  const analysisCache = new Map(); // symbol -> { closeTime, analysis }

  async function fetchAllCoins() {
    const results = [];
    for (const symbol of COINS) {
      try {
        const kResp = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=5m&limit=120`);
        if (!kResp.ok) throw new Error('Klines fail');
        const raw = await kResp.json();
        const lastCandle = raw[raw.length-1];
        const closeTime = lastCandle[6]; // candle close timestamp

        const cached = analysisCache.get(symbol);
        // If the latest candle hasn't closed yet, reuse the cached analysis
        if (cached && cached.closeTime === closeTime) {
          const tResp = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`);
          if (!tResp.ok) throw new Error('Ticker fail');
          const ticker = await tResp.json();
          const livePrice = parseFloat(ticker.lastPrice);
          results.push({
            symbol,
            livePrice,
            changePercent: parseFloat(ticker.priceChangePercent),
            direction: cached.analysis.direction,
            strength: cached.analysis.strength,
            price: cached.analysis.price,
            condDisplay: cached.analysis.condDisplay,
            atr: cached.analysis.atr
          });
          continue;
        }

        // New candle, full analysis needed
        const data = raw.map(c => ({
          open: parseFloat(c[1]), high: parseFloat(c[2]), low: parseFloat(c[3]),
          close: parseFloat(c[4]), volume: parseFloat(c[5])
        }));
        if (data.length < 60) continue;

        const analysis = analyzeCoin(data, symbol);
        if (analysis) {
          analysisCache.set(symbol, { closeTime, analysis });
        }

        const tResp = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbol}`);
        if (!tResp.ok) throw new Error('Ticker fail');
        const ticker = await tResp.json();
        if (analysis) {
          results.push({
            symbol,
            livePrice: parseFloat(ticker.lastPrice),
            changePercent: parseFloat(ticker.priceChangePercent),
            ...analysis
          });
        }
      } catch (err) {
        console.warn(`Skipping ${symbol}:`, err.message);
      }
    }
    return results.sort((a,b) => b.strength - a.strength);
  }

  // ================================================================
  //  GOOGLE SHEETS API (kept as-is; improvement recommended later)
  // ================================================================
  let lastSheetError = null;

  async function addSignalToSheet(signal) {
    try {
      const payload = {
        action: 'add',
        id: signal.id,
        timestamp: signal.timestamp,
        openTime: signal.openTime,
        symbol: signal.symbol,
        direction: signal.direction,
        entryMin: signal.entryLow,
        entryMax: signal.entryHigh,
        tp: signal.tp,
        sl: signal.sl
      };
      await fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      lastSheetError = null;
      console.log('✅ Sheet add sent (no-cors)');
      return true;
    } catch (e) {
      const msg = '❌ Sheet Add Error: ' + e.message;
      console.error(msg);
      lastSheetError = msg;
      return false;
    }
  }

  async function updateSignalStatus(id, status, closedPrice, closeTime) {
    try {
      const payload = { action: 'update', id, status, closedPrice, closeTime };
      await fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      lastSheetError = null;
      console.log('✅ Sheet update sent (no-cors)');
      return true;
    } catch (e) {
      const msg = '❌ Sheet Update Error: ' + e.message;
      console.error(msg);
      lastSheetError = msg;
      return false;
    }
  }

  async function fetchHistoryFromSheet() {
    try {
      const response = await fetch(GOOGLE_SCRIPT_URL + '?t=' + Date.now());
      if (!response.ok) throw new Error('HTTP ' + response.status);
      const json = await response.json();
      if (json.success && json.data) return json.data;
      return [];
    } catch (e) {
      console.warn('⚠️ Fetch history failed:', e.message);
      return [];
    }
  }

  // ================================================================
  //  LOCAL STORAGE
  // ================================================================
  function getLocalHistory() { try { const raw = localStorage.getItem('scalpHistory'); return raw ? JSON.parse(raw) : []; } catch { return []; } }
  function saveLocalHistory(h) { try { localStorage.setItem('scalpHistory', JSON.stringify(h)); } catch {} }

  // ================================================================
  //  CORE LOGIC WITH SIGNAL EXPIRY
  // ================================================================
  let isProcessing = false;
  const activeSignals = new Map();
  function generateId() { return 'sig_' + Date.now() + '_' + Math.random().toString(36).substr(2,4); }

  async function processScan() {
    if (isProcessing) return;
    isProcessing = true;
    refreshBtn.disabled = true;
    refreshBtn.innerHTML = '<span class="spinner"></span>';

    try {
      const all = await fetchAllCoins();
      if (!all || all.length === 0) throw new Error('No coin data fetched');

      const priceMap = {}; all.forEach(c => priceMap[c.symbol] = c.livePrice);
      const history = getLocalHistory();

      // Check for expired signals before processing new ones
      const now = Date.now();
      const toExpire = [];
      for (const [symbol, signal] of activeSignals) {
        if (signal.expireTime && now > signal.expireTime && signal.status === 'OPEN') {
          toExpire.push(symbol);
          signal.status = 'EXPIRED';
          signal.result = '⏰ Expired';
          signal.closedPrice = priceMap[symbol] || signal.livePrice;
          signal.closeTime = now;
          await updateSignalStatus(signal.id, 'EXPIRED', signal.closedPrice, now);

          // Update local history
          const histIdx = history.findIndex(h => h.id === signal.id);
          if (histIdx >= 0) {
            history[histIdx].status = 'EXPIRED';
            history[histIdx].result = '⏰ Expired';
            history[histIdx].closedPrice = signal.closedPrice;
            history[histIdx].closeTime = now;
          }
        }
      }
      for (const sym of toExpire) activeSignals.delete(sym);
      if (toExpire.length > 0) saveLocalHistory(history);

      // Process new signals for coins not already active
      for (const s of all) {
        if (!activeSignals.has(s.symbol)) {
          const params = generateSignalParams(s.symbol, s.livePrice, s.direction, s.atr);
          const newSig = {
            id: generateId(), symbol: s.symbol, direction: s.direction,
            entryLow: params.entryLow, entryHigh: params.entryHigh,
            tp: params.tp, sl: params.sl, rr: params.rr, tick: params.tick,
            condDisplay: s.condDisplay, strength: s.strength,
            timestamp: new Date().toISOString(), openTime: Date.now(),
            livePrice: s.livePrice, changePercent: s.changePercent,
            status: 'OPEN',
            expireTime: Date.now() + SIGNAL_EXPIRY_MINUTES * 60 * 1000
          };
          activeSignals.set(s.symbol, newSig);
          await addSignalToSheet(newSig);
          let hist = getLocalHistory();
          hist.push({ ...newSig, result: '—', closedPrice: null, closeTime: null });
          saveLocalHistory(hist);
        } else {
          // Update live price for existing signal
          const existing = activeSignals.get(s.symbol);
          if (existing) { existing.livePrice = s.livePrice; existing.changePercent = s.changePercent; }
        }
      }

      // Check TP/SL hits for open signals
      let historyUpdated = false;
      const toRemove = [];
      for (const [symbol, signal] of activeSignals) {
        const currentPrice = priceMap[symbol];
        if (!currentPrice || signal.status !== 'OPEN') continue;
        let hitStatus = null;
        if (signal.direction === 'LONG') {
          if (currentPrice >= signal.tp) hitStatus = 'PROFIT';
          else if (currentPrice <= signal.sl) hitStatus = 'LOSS';
        } else {
          if (currentPrice <= signal.tp) hitStatus = 'PROFIT';
          else if (currentPrice >= signal.sl) hitStatus = 'LOSS';
        }
        if (hitStatus) {
          const closeTime = Date.now();
          signal.status = hitStatus;
          signal.result = hitStatus === 'PROFIT' ? 'TP Hit ✅' : 'SL Hit ❌';
          signal.closedPrice = currentPrice;
          signal.closeTime = closeTime;
          toRemove.push(symbol);
          for (let i=0; i<history.length; i++) {
            if (history[i].id === signal.id) {
              history[i].status = hitStatus;
              history[i].result = signal.result;
              history[i].closedPrice = currentPrice;
              history[i].closeTime = closeTime;
              historyUpdated = true;
              break;
            }
          }
          await updateSignalStatus(signal.id, hitStatus, currentPrice, closeTime);
        }
      }
      for (const sym of toRemove) activeSignals.delete(sym);
      if (historyUpdated) saveLocalHistory(history);

      const active = Array.from(activeSignals.values()).filter(s => s.status === 'OPEN');
      liveCount.textContent = active.length;
      renderSignals(active);
      renderHistory(history);

      if (lastSheetError) {
        statusText.innerHTML = `🔴 <span class="error">Sheet Error!</span> Check console. Last: ${lastSheetError.substring(0, 60)}...`;
      } else {
        statusText.innerHTML = `🟢 <span class="live">Live</span> · ${active.length} active · ${new Date().toLocaleTimeString()}`;
      }

    } catch (err) {
      console.error(err);
      statusText.innerHTML = '🔴 Error: ' + err.message;
    } finally {
      refreshBtn.disabled = false;
      refreshBtn.innerHTML = '⟳ Refresh';
      isProcessing = false;
    }
  }

  // ================================================================
  //  RENDER SIGNALS (with confidence bar)
  // ================================================================
  function renderSignals(signals) {
    if (!signals || signals.length === 0) {
      signalsGrid.innerHTML = `<div class="empty-state">No active signals. Waiting...</div>`;
      return;
    }
    let html = '';
    const maxDisplay = 10;
    const displayed = signals.slice(0, maxDisplay);
    displayed.forEach(s => {
      const dirClass = s.direction.toLowerCase();
      const dirDisplay = s.direction === 'LONG' ? '▲' : '▼';
      const tick = s.tick || 0.01;

      const confidence = s.strength || 0;
      let confClass = 'low';
      if (confidence >= 80) confClass = 'high';
      else if (confidence >= 60) confClass = 'medium';

      html += `
        <div class="signal-row ${dirClass}">
          <span class="col-sym">${getSymbol(s.symbol)}</span>
          <span class="col-dir ${dirClass}">${dirDisplay}</span>
          <span class="col-price">${formatPrice(s.livePrice, tick)}</span>
          <span class="col-entry">${formatPriceShort(s.entryLow, tick)} – ${formatPriceShort(s.entryHigh, tick)}</span>
          <span class="col-tp">${formatPriceShort(s.tp, tick)}</span>
          <span class="col-sl">${formatPriceShort(s.sl, tick)}</span>
          <span class="col-conf ${confClass}">
            <div class="conf-bar-container">
              <div class="conf-bar ${confClass}" style="width:${confidence}%"></div>
            </div>
            ${confidence}%
          </span>
          <span class="col-time">${fmtTime(s.timestamp)}</span>
        </div>
      `;
    });
    if (signals.length > maxDisplay) {
      html += `<div class="empty-state" style="padding:8px;">+ ${signals.length - maxDisplay} more signals not shown</div>`;
    }
    signalsGrid.innerHTML = html;
  }

  // ================================================================
  //  RENDER HISTORY (unchanged but with expiry handling)
  // ================================================================
  function renderHistory(history) {
    const closedTrades = history.filter(h => h.status === 'PROFIT' || h.status === 'LOSS' || h.status === 'EXPIRED');
    if (!closedTrades || closedTrades.length === 0) {
      historyList.innerHTML = `<div class="empty-state">No completed trades yet.</div>`;
      historyCount.textContent = '0 entries';
      return;
    }
    const sorted = closedTrades.sort((a, b) => (b.closeTime || 0) - (a.closeTime || 0)).slice(0, 50);
    historyCount.textContent = sorted.length + ' entries';
    let html = '';
    for (const h of sorted) {
      const dirClass = h.direction ? h.direction.toLowerCase() : 'neutral';
      const tick = h.tick || 0.01;
      let resultText = '—', resultClass = '';
      if (h.status === 'PROFIT') { resultText = '✅ TP'; resultClass = 'win'; }
      else if (h.status === 'LOSS') { resultText = '❌ SL'; resultClass = 'loss'; }
      else if (h.status === 'EXPIRED') { resultText = '⏰ Exp'; resultClass = 'loss'; }
      let durationStr = '—', durClass = '';
      if (h.openTime && h.closeTime) {
        const durMs = h.closeTime - h.openTime;
        durationStr = fmtDuration(durMs);
        if (durMs < 120000) durClass = 'fast';
        else if (durMs < 600000) durClass = 'medium';
        else durClass = 'slow';
      }
      const priceDisplay = h.closedPrice ? formatPrice(h.closedPrice, tick) : '—';
      html += `
        <div class="history-item">
          <span class="h-sym">${getSymbol(h.symbol)}</span>
          <span class="h-dir ${dirClass}">${h.direction === 'LONG' ? 'L' : 'S'}</span>
          <span class="h-time">${fmtTime(h.timestamp)}</span>
          <span class="h-duration ${durClass}">${durationStr}</span>
          <span class="h-result ${resultClass}">${resultText}</span>
          <span class="h-price">${priceDisplay}</span>
        </div>
      `;
    }
    historyList.innerHTML = html;
  }

  // ================================================================
  //  SYNC REMOTE
  // ================================================================
  async function syncRemoteHistory() {
    try {
      const remote = await fetchHistoryFromSheet();
      if (remote && remote.length > 0) {
        const transformed = remote.map(r => ({
          id: r.ID || r.id, symbol: r.Symbol || r.symbol, direction: r.Direction || r.direction,
          entryLow: parseFloat(r.EntryMin || r.entryMin), entryHigh: parseFloat(r.EntryMax || r.entryMax),
          tp: parseFloat(r.TP || r.tp), sl: parseFloat(r.SL || r.sl),
          timestamp: r.Timestamp || r.timestamp, status: r.Status || r.status,
          result: r.Result || r.result, closedPrice: parseFloat(r.ClosedPrice || r.closedPrice) || null,
          openTime: r.OpenTime ? parseInt(r.OpenTime) : null, closeTime: r.CloseTime ? parseInt(r.CloseTime) : null,
          tick: 0.001
        }));
        const local = getLocalHistory();
        const merged = [...local];
        for (const r of transformed) {
          const existingIdx = merged.findIndex(l => l.id === r.id);
          if (existingIdx >= 0) {
            if (r.closeTime && !merged[existingIdx].closeTime) merged[existingIdx] = { ...merged[existingIdx], ...r };
          } else merged.push(r);
        }
        saveLocalHistory(merged);
        renderHistory(merged);
      }
    } catch (e) {}
  }

  // ================================================================
  //  AUTO REFRESH
  // ================================================================
  let scanInterval = null, historyInterval = null;
  async function fullUpdate() { await processScan(); await syncRemoteHistory(); }
  function startAutoRefresh() {
    if (scanInterval) clearInterval(scanInterval);
    if (historyInterval) clearInterval(historyInterval);
    fullUpdate();
    scanInterval = setInterval(processScan, SCAN_INTERVAL);
    historyInterval = setInterval(() => { const hist = getLocalHistory(); renderHistory(hist); }, HISTORY_INTERVAL);
  }
  refreshBtn.addEventListener('click', () => {
    if (scanInterval) clearInterval(scanInterval);
    if (historyInterval) clearInterval(historyInterval);
    fullUpdate().finally(() => startAutoRefresh());
  });
  startAutoRefresh();
</script>

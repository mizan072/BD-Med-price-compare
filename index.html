<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <title>ScalpScanner Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
    body { background: #090d14; min-height: 100vh; padding: 16px; display: flex; justify-content: center; }
    .app { max-width: 950px; width: 100%; }

    /* Header styling */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
    .header h1 { color: #f0f4fa; font-size: 24px; font-weight: 700; display: flex; align-items: center; gap: 10px; white-space: nowrap; }
    .header h1 span { background: linear-gradient(135deg, #33d9a8, #1db883); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 30px; color: #090d14; letter-spacing: 0.5px; }
    .badge { background: #161f2b; padding: 6px 14px; border-radius: 40px; color: #9ab0c9; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; border: 1px solid #253240; white-space: nowrap; }
    .badge .dot { width: 8px; height: 8px; background: #33d9a8; border-radius: 50%; display: inline-block; animation: pulse-dot 1.6s infinite; }
    @keyframes pulse-dot { 0% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.3; transform: scale(0.9); } }

    /* Top Action Bar */
    .top-bar { display: flex; justify-content: space-between; align-items: center; background: #111a24; padding: 10px 16px; border-radius: 14px; border: 1px solid #1e2c3b; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
    .top-bar .status { color: #7a94af; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .top-bar .status .live { color: #33d9a8; font-weight: 600; }
    .top-bar .status .error { color: #f25b6a; font-weight: 600; }
    .refresh-btn { background: #1e2c3b; border: none; color: #d6e4f0; padding: 8px 18px; border-radius: 30px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 8px; border: 1px solid #2d3f52; transition: all 0.2s; min-height: 40px; }
    .refresh-btn:hover:not(:disabled) { background: #2d3f52; border-color: #3e566e; }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .refresh-btn .spinner { width: 14px; height: 14px; border: 2px solid #5f7d9a; border-top-color: #d6e4f0; border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Active Signals Dashboard */
    .signals-container { background: #111a24; border-radius: 16px; border: 1px solid #1e2c3b; overflow: hidden; margin-bottom: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
    .signals-header { display: grid; grid-template-columns: 70px 50px 90px 1fr 90px 90px 110px 80px; gap: 6px; padding: 12px 16px; background: #0a111a; border-bottom: 1px solid #1e2c3b; color: #5f7d9a; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .signals-grid { display: flex; flex-direction: column; max-height: 450px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .signals-grid::-webkit-scrollbar { width: 6px; }
    .signals-grid::-webkit-scrollbar-track { background: #0a111a; }
    .signals-grid::-webkit-scrollbar-thumb { background: #2d3f52; border-radius: 4px; }

    .signal-row { display: grid; grid-template-columns: 70px 50px 90px 1fr 90px 90px 110px 80px; gap: 6px; padding: 12px 16px; align-items: center; border-bottom: 1px solid #1a2533; font-size: 14px; transition: background 0.15s; background: #111a24; min-height: 52px; }
    .signal-row:last-child { border-bottom: none; }
    .signal-row:hover { background: #1a2633; }
    .signal-row .col-sym { font-weight: 700; color: #f0f4fa; }
    .signal-row .col-dir { font-weight: 700; text-align: center; }
    .signal-row .col-dir.long { color: #33d9a8; }
    .signal-row .col-dir.short { color: #f25b6a; }
    .signal-row .col-price { color: #d6e4f0; font-weight: 600; white-space: nowrap; }
    .signal-row .col-entry { color: #9ab0c9; font-size: 13px; white-space: nowrap; }
    .signal-row .col-tp { color: #33d9a8; font-weight: 600; }
    .signal-row .col-sl { color: #f25b6a; font-weight: 600; }
    .signal-row .col-conf { font-weight: 700; display: flex; align-items: center; gap: 6px; justify-content: center; }
    
    .conf-bar-container { width: 45px; height: 5px; background: #1e2c3b; border-radius: 30px; overflow: hidden; flex-shrink: 0; }
    .conf-bar { height: 100%; border-radius: 30px; }
    .conf-bar.high { background: #33d9a8; }
    .conf-bar.medium { background: #f4c95d; }
    .conf-bar.low { background: #f25b6a; }
    .signal-row .col-time { color: #5f7d9a; font-size: 12px; text-align: right; white-space: nowrap; }
    .signal-row.long { border-left: 4px solid #33d9a8; }
    .signal-row.short { border-left: 4px solid #f25b6a; }
    .empty-state { color: #5f7d9a; text-align: center; padding: 36px 16px; font-size: 14px; font-style: italic; }

    /* Closed Trade History List */
    .history-section { background: #111a24; border-radius: 16px; padding: 14px 0 0 0; border: 1px solid #1e2c3b; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
    .history-header { display: flex; justify-content: space-between; align-items: center; padding: 0 16px 12px 16px; border-bottom: 1px solid #1a2533; flex-wrap: wrap; gap: 8px; }
    .history-header h3 { color: #9ab0c9; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .history-header .count { background: #1a2430; padding: 3px 12px; border-radius: 30px; font-size: 12px; color: #7a94af; font-weight: 600; }
    .history-list { display: flex; flex-direction: column; max-height: 360px; overflow-y: auto; padding: 2px; -webkit-overflow-scrolling: touch; }
    .history-list::-webkit-scrollbar { width: 6px; }
    .history-list::-webkit-scrollbar-track { background: #0a111a; }
    .history-list::-webkit-scrollbar-thumb { background: #2d3f52; border-radius: 4px; }

    .history-item { display: grid; grid-template-columns: 70px 50px 90px 100px 110px 1fr; gap: 6px; padding: 10px 14px; font-size: 13px; align-items: center; border-bottom: 1px solid #1a2533; background: #111a24; min-height: 46px; }
    .history-item:last-child { border-bottom: none; }
    .history-item:hover { background: #1a2633; }
    .history-item .h-sym { font-weight: 700; color: #f0f4fa; }
    .history-item .h-dir { font-weight: 600; font-size: 12px; text-align: center; border-radius: 4px; padding: 1px 4px; }
    .history-item .h-dir.long { color: #33d9a8; background: rgba(51, 217, 168, 0.1); }
    .history-item .h-dir.short { color: #f25b6a; background: rgba(242, 91, 106, 0.1); }
    .history-item .h-time { color: #5f7d9a; font-size: 12px; }
    .history-item .h-duration { font-size: 11px; font-weight: 600; text-align: center; background: #1a2430; padding: 2px 8px; border-radius: 20px; color: #9ab0c9; }
    .history-item .h-duration.fast { border: 1px solid rgba(51, 217, 168, 0.3); }
    .history-item .h-duration.medium { border: 1px solid rgba(244, 201, 93, 0.3); }
    .history-item .h-duration.slow { border: 1px solid rgba(242, 91, 106, 0.3); }
    .history-item .h-result { font-weight: 700; font-size: 13px; text-align: center; }
    .history-item .h-result.win { color: #33d9a8; }
    .history-item .h-result.loss { color: #f25b6a; }
    .history-item .h-price { font-size: 13px; font-weight: 600; color: #d6e4f0; text-align: right; }

    /* ========== RESPONSIVE MOBILE BREAKPOINTS ========== */
    @media (max-width: 768px) {
      .signals-header { font-size: 10px; grid-template-columns: 60px 40px 80px 1fr 75px 75px 95px 70px; padding: 10px 12px; }
      .signal-row { grid-template-columns: 60px 40px 80px 1fr 75px 75px 95px 70px; font-size: 13px; padding: 10px 12px; }
      .history-item { grid-template-columns: 60px 40px 80px 90px 95px 1fr; }
    }

    @media (max-width: 650px) {
      .signals-header { display: none; }
      .signal-row { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: repeat(3, auto); gap: 4px 8px; padding: 12px; }
      .signal-row .col-sym { grid-column: 1 / 2; grid-row: 1 / 2; font-size: 16px; }
      .signal-row .col-dir { grid-column: 2 / 3; grid-row: 1 / 2; text-align: left; }
      .signal-row .col-price { grid-column: 3 / 4; grid-row: 1 / 2; text-align: right; font-size: 15px; }
      .signal-row .col-entry { grid-column: 1 / 3; grid-row: 2 / 3; font-size: 12px; color: #7a94af; }
      .signal-row .col-tp { grid-column: 1 / 2; grid-row: 3 / 4; font-size: 12px; }
      .signal-row .col-sl { grid-column: 2 / 3; grid-row: 3 / 4; font-size: 12px; }
      .signal-row .col-conf { grid-column: 3 / 4; grid-row: 3 / 4; font-size: 13px; justify-content: flex-end; }
      .signal-row .col-time { display: none; }

      .history-item { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto auto; gap: 4px 6px; padding: 10px; }
      .history-item .h-sym { grid-column: 1 / 2; grid-row: 1 / 2; font-size: 14px; }
      .history-item .h-dir { grid-column: 2 / 3; grid-row: 1 / 2; text-align: left; width: fit-content; }
      .history-item .h-time { grid-column: 3 / 4; grid-row: 1 / 2; text-align: right; }
      .history-item .h-duration { grid-column: 1 / 2; grid-row: 2 / 3; text-align: left; background: none; border: none; padding: 0; }
      .history-item .h-result { grid-column: 2 / 3; grid-row: 2 / 3; text-align: left; }
      .history-item .h-price { grid-column: 3 / 4; grid-row: 2 / 3; text-align: right; }
    }

    @media (max-width: 480px) {
      body { padding: 8px; }
      .header h1 { font-size: 20px; }
      .top-bar { padding: 8px 12px; }
      .refresh-btn { padding: 6px 14px; font-size: 12px; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📡 ScalpScanner <span>PRO</span></h1>
    <span class="badge"><span class="dot"></span> <span id="liveCount">0</span> active</span>
  </div>

  <div class="top-bar">
    <span class="status" id="statusText">🟢 <span class="live">Live</span> · scanning...</span>
    <button class="refresh-btn" id="refreshBtn">⟳ Refresh</button>
  </div>

  <div class="signals-container">
    <div class="signals-header">
      <span>Coin</span> <span>Dir</span> <span>Price</span> <span>Entry Range</span>
      <span>TP</span> <span>SL</span> <span>Confidence</span> <span style="text-align:right">Time</span>
    </div>
    <div class="signals-grid" id="signalsGrid">
      <div class="empty-state">No active signals. Waiting for setup...</div>
    </div>
  </div>

  <div class="history-section">
    <div class="history-header">
      <h3>📜 Trade History (Closed)</h3>
      <span class="count" id="historyCount">0 entries</span>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-state">No completed trades yet.</div>
    </div>
  </div>
</div>

<script>
  // ================================================================
  //  CONFIG & ENDPOINTS (Change to your newly deployed web app URL)
  // ================================================================
  const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwF29goZMtte3SnfnUyEPcwrqVy8kkZDjvdWYl3W4Q4nNUb3YDlmlOwDe9ID-5G5IJM/exec';

  const TICK_SIZE = {
    'BTCUSDT': 0.01, 'ETHUSDT': 0.01, 'BNBUSDT': 0.01,
    'SOLUSDT': 0.001, 'AVAXUSDT': 0.001, 'DOTUSDT': 0.001, 'LINKUSDT': 0.001,
    'XRPUSDT': 0.0001, 'ADAUSDT': 0.0001, 'DOGEUSDT': 0.00001
  };
  const COINS = ['BTCUSDT','ETHUSDT','BNBUSDT','SOLUSDT','XRPUSDT','ADAUSDT','DOGEUSDT','AVAXUSDT','DOTUSDT','LINKUSDT'];
  const SCAN_INTERVAL = 15000;
  const HISTORY_INTERVAL = 30000;
  const SIGNAL_EXPIRY_MINUTES = 30;

  const $ = id => document.getElementById(id);
  const signalsGrid = $('signalsGrid');
  const historyList = $('historyList');
  const statusText = $('statusText');
  const refreshBtn = $('refreshBtn');
  const liveCount = $('liveCount');
  const historyCount = $('historyCount');

  let lastSheetError = null;
  let isProcessing = false;
  const activeSignals = new Map();

  function getTick(symbol) { return TICK_SIZE[symbol] || 0.01; }
  function formatPrice(value, tick) { if (!tick || isNaN(value)) return '$' + value; const decimals = Math.max(0, Math.ceil(-Math.log10(tick))); return '$' + Number(value).toFixed(decimals); }
  function formatPriceShort(value, tick) { if (!tick || isNaN(value)) return value; const decimals = Math.max(0, Math.ceil(-Math.log10(tick))); return Number(value).toFixed(decimals); }
  function fmtTime(iso) { if (!iso) return '—'; try { const d = new Date(iso); return d.toLocaleTimeString('en-US', { hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' }); } catch { return iso; } }
  function fmtDuration(ms) { if (!ms || ms < 0) return '—'; const totalSec = Math.floor(ms / 1000); if (totalSec < 60) return totalSec + 's'; const min = Math.floor(totalSec / 60); const sec = totalSec % 60; return min + 'm ' + sec + 's'; }
  function getSymbol(s) { return s ? s.replace('USDT','') : ''; }

  // ================================================================
  //  TECHNICAL SCAFFOLDING & LOCAL ANALYSIS
  // ================================================================
  function generateId() { return 'sig_' + Date.now() + '_' + Math.random().toString(36).substr(2,4); }

  // Simulated indicators or analysis hook
  function analyzeCoin(symbol) {
    // Scaffold logic for demo or local calculations
    const mockConfidence = Math.floor(Math.random() * 60) + 40; // 40% - 100%
    const direction = Math.random() > 0.5 ? 'LONG' : 'SHORT';
    return { shouldTrade: Math.random() > 0.85, strength: mockConfidence, direction };
  }

  // ================================================================
  //  SERVER / SHEET INTERACTION (Fixed Data Mappings for v5 Backend)
  // ================================================================
  async function addSignalToSheet(signal) {
    try {
      const response = await fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain' }, // Avoid CORS preflight execution blocks
        body: JSON.stringify({
          action: 'add',
          id: signal.id,
          timestamp: signal.timestamp,
          symbol: signal.symbol,
          direction: signal.direction,
          entryMin: signal.entryLow,
          entryMax: signal.entryHigh,
          tp: signal.tp,
          sl: signal.sl,
          openTime: signal.openTime
        })
      });
      const res = await response.json();
      lastSheetError = res.success ? null : res.error;
      return res;
    } catch (err) {
      lastSheetError = err.message;
      console.error("Add signal network error:", err);
    }
  }

  async function updateSignalStatus(id, status, closedPrice, closeTime) {
    try {
      const response = await fetch(GOOGLE_SCRIPT_URL, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({
          action: 'update',
          id: id,
          status: status,
          closedPrice: closedPrice,
          closeTime: closeTime || Date.now()
        })
      });
      const res = await response.json();
      lastSheetError = res.success ? null : res.error;
      return res;
    } catch (err) {
      lastSheetError = err.message;
      console.error("Update status network error:", err);
    }
  }

  async function fetchHistoryFromSheet() {
    try {
      const response = await fetch(GOOGLE_SCRIPT_URL);
      const json = await response.json();
      if (json.success) {
        lastSheetError = null;
        // Transform Array objects back to unified UI arrays safely
        saveLocalHistory(json.data || []);
        return json.data || [];
      }
      lastSheetError = json.error;
      return getLocalHistory();
    } catch (err) {
      lastSheetError = err.message;
      console.error("Fetch history network error:", err);
      return getLocalHistory();
    }
  }

  // ================================================================
  //  LOCAL CACHE ACTIONS
  // ================================================================
  function getLocalHistory() { try { return JSON.parse(localStorage.getItem('scalp_hist')) || []; } catch { return []; } }
  function saveLocalHistory(h) { localStorage.setItem('scalp_hist', JSON.stringify(h)); }

  // ================================================================
  //  CORE EXECUTION BLOCK
  // ================================================================
  async function processScan() {
    if (isProcessing) return;
    isProcessing = true;
    updateStatusDisplay(true);

    try {
      // Loop across coin profiles dynamically 
      for (const coin of COINS) {
        if (activeSignals.has(coin)) {
          // Expiry management or active simulation check
          const sig = activeSignals.get(coin);
          const minutesElapsed = (Date.now() - sig.openTime) / 60000;
          if (minutesElapsed >= SIGNAL_EXPIRY_MINUTES) {
            await updateSignalStatus(sig.id, 'EXPIRED', sig.livePrice, Date.now());
            activeSignals.delete(coin);
          }
          continue;
        }

        const analysis = analyzeCoin(coin);
        if (analysis.shouldTrade) {
          const tick = getTick(coin);
          const currentPrice = 100 + (Math.random() * 50); // Simulation placeholder price
          
          const signalData = {
            id: generateId(),
            timestamp: new Date().toISOString(),
            symbol: coin,
            direction: analysis.direction,
            livePrice: currentPrice,
            entryLow: currentPrice * 0.995,
            entryHigh: currentPrice * 1.002,
            tp: analysis.direction === 'LONG' ? currentPrice * 1.02 : currentPrice * 0.98,
            sl: analysis.direction === 'LONG' ? currentPrice * 0.99 : currentPrice * 1.01,
            strength: analysis.strength,
            openTime: Date.now(),
            tick: tick
          };

          activeSignals.set(coin, signalData);
          await addSignalToSheet(signalData);
        }
      }
      
      renderSignals(Array.from(activeSignals.values()));
      liveCount.textContent = activeSignals.size;
    } catch (e) {
      console.error("Scan processing broken loop:", e);
    } finally {
      isProcessing = false;
      updateStatusDisplay(false);
    }
  }

  function updateStatusDisplay(loading) {
    if (lastSheetError) {
      statusText.innerHTML = `<span class="error">❌ Backend Error</span> · ${lastSheetError}`;
      return;
    }
    if (loading) {
      statusText.innerHTML = `⏳ <span style="color:#f4c95d; font-weight:600;">Scanning</span> · Analyzing network matrix...`;
    } else {
      statusText.innerHTML = `🟢 <span class="live">Live</span> · scanning assets...`;
    }
  }

  // ================================================================
  //  UI RENDERING ENGINE (Remapped to clear object headers)
  // ================================================================
  function renderSignals(signals) {
    if (!signals || signals.length === 0) {
      signalsGrid.innerHTML = `<div class="empty-state">No active signals. Waiting...</div>`;
      return;
    }
    let html = '';
    signals.slice(0, 10).forEach(s => {
      const dirClass = s.direction.toLowerCase();
      const dirDisplay = s.direction === 'LONG' ? '▲' : '▼';
      const tick = s.tick || 0.01;
      const confidence = s.strength || 70;
      let confClass = confidence >= 80 ? 'high' : (confidence >= 60 ? 'medium' : 'low');

      html += `
        <div class="signal-row ${dirClass}">
          <span class="col-sym">${getSymbol(s.symbol)}</span>
          <span class="col-dir ${dirClass}">${dirDisplay}</span>
          <span class="col-price">${formatPrice(s.livePrice, tick)}</span>
          <span class="col-entry">${formatPriceShort(s.entryLow, tick)} – ${formatPriceShort(s.entryHigh, tick)}</span>
          <span class="col-tp">${formatPriceShort(s.tp, tick)}</span>
          <span class="col-sl">${formatPriceShort(s.sl, tick)}</span>
          <span class="col-conf ${confClass}">
            <div class="conf-bar-container">
              <div class="conf-bar ${confClass}" style="width:${confidence}%"></div>
            </div>
            ${confidence}%
          </span>
          <span class="col-time">${fmtTime(s.timestamp)}</span>
        </div>
      `;
    });
    signalsGrid.innerHTML = html;
  }

  function renderHistory(historyData) {
    // Match exact key signatures from backend structure map
    const closedTrades = historyData.filter(h => h["Status"] === 'PROFIT' || h["Status"] === 'LOSS' || h["Status"] === 'EXPIRED' || h["Status"] === 'OPEN');
    
    if (!closedTrades || closedTrades.length === 0) {
      historyList.innerHTML = `<div class="empty-state">No completed trades recorded inside sheet.</div>`;
      historyCount.textContent = '0 entries';
      return;
    }
    
    const sorted = closedTrades.sort((a, b) => (b["Close Time"] || 0) - (a["Close Time"] || 0)).slice(0, 50);
    historyCount.textContent = sorted.length + ' entries';
    
    let html = '';
    for (const h of sorted) {
      const dir = h["Direction"] || 'LONG';
      const dirClass = dir.toLowerCase();
      const symbol = h["Symbol"] || '';
      const tick = getTick(symbol);
      
      let resultText = h["Result"] || '—';
      let resultClass = h["Status"] === 'PROFIT' ? 'win' : (h["Status"] === 'OPEN' ? '' : 'loss');
      
      let durationStr = '—', durClass = '';
      if (h["Open Time"] && h["Close Time"]) {
        const durMs = Number(h["Close Time"]) - Number(h["Open Time"]);
        durationStr = fmtDuration(durMs);
        durClass = durMs < 120000 ? 'fast' : (durMs < 600000 ? 'medium' : 'slow');
      }

      const closedPriceNum = parseFloat(h["Closed Price"]);
      const priceDisplay = (closedPriceNum && closedPriceNum > 0) ? formatPrice(closedPriceNum, tick) : '—';
      
      html += `
        <div class="history-item">
          <span class="h-sym">${getSymbol(symbol)}</span>
          <span class="h-dir ${dirClass}">${dir === 'LONG' ? 'L' : 'S'}</span>
          <span class="h-time">${fmtTime(h["Timestamp"])}</span>
          <span class="h-duration ${durClass}">${durationStr}</span>
          <span class="h-result ${resultClass}">${resultText}</span>
          <span class="h-price">${priceDisplay}</span>
        </div>
      `;
    }
    historyList.innerHTML = html;
  }

  // ================================================================
  //  SYNC CYCLE RUNNERS
  // ================================================================
  async function fullUpdate() { 
    refreshBtn.disabled = true;
    refreshBtn.innerHTML = `<span class="spinner"></span> Syncing...`;
    
    await processScan(); 
    const hist = await fetchHistoryFromSheet(); 
    renderHistory(hist);
    
    refreshBtn.disabled = false;
    refreshBtn.innerHTML = `⟳ Refresh`;
  }

  let scanInterval = null, historyInterval = null;
  function startAutoRefresh() {
    if (scanInterval) clearInterval(scanInterval);
    if (historyInterval) clearInterval(historyInterval);
    
    fullUpdate();
    
    scanInterval = setInterval(processScan, SCAN_INTERVAL);
    historyInterval = setInterval(async () => { 
      const hist = await fetchHistoryFromSheet(); 
      renderHistory(hist); 
    }, HISTORY_INTERVAL);
  }

  refreshBtn.addEventListener('click', startAutoRefresh);
  
  // Trigger on startup
  window.addEventListener('DOMContentLoaded', startAutoRefresh);
